<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>UNI 貓咪村</title>
<!--
═══════════════════════════════════════════════════════════════════════
  UNI 點數系統 · 貓咪村遊戲世界 village.html v1.0(橫式沉浸版)
═══════════════════════════════════════════════════════════════════════
  📅 建立:2026/06/18
  🎯 用途:成人線點數系統「遊戲感世界」前端。橫式強制橫向,五區域。
  🔌 後端:點數 GAS(完全沿用 points-game.html 的 API,後端一行不改)
  🎨 素材:Cloudinary dvti8ug8s(村莊背景+5建築+UI框)
  🔐 認證:LINE Login(沿用三道防線)+ ?uid 備援

  🚨 緊急回滾:這是「新檔」,舊 points-game.html 完整保留。
              出問題 → LINE 選單連結改回 points-game.html 即可,30秒。
  📌 五區域:🏠我的小屋(圖鑑) 🎰扭蛋站(抽卡) 🏛️榮耀神殿(譽望榜)
             🛋️交誼廳(影片+裝飾貓) 🎁村口郵筒(賺點/介紹/兌換)
═══════════════════════════════════════════════════════════════════════
-->
<style>
  /* ════════════════════════════════════════════════════════════════
     主題色:延續點數系統深紫金 + 水彩粉嫩
  ════════════════════════════════════════════════════════════════ */
  :root {
    --gold: #C9A668;
    --gold-deep: #A88547;
    --purple: #8B6FA8;
    --purple-deep: #5E4A78;
    --rose: #E8A0A8;
    --cream: #FAF6F0;
    --text-light: #FFF8F0;
    --text-dark: #5E4A55;
    --panel-bg: rgba(94, 74, 120, 0.82);
    --panel-line: rgba(201, 166, 104, 0.6);
    --shadow: 0 4px 20px rgba(94, 74, 120, 0.35);

    /* 稀有度 */
    --rarity-n: #A89899;
    --rarity-r: #B98BC9;
    --rarity-ssr: #E8C77E;

    /* === 你的 Cloudinary 素材(已對齊命名)=== */
    --img-village: url('https://res.cloudinary.com/dvti8ug8s/image/upload/v1781858775/ChatGPT_Image_2026%E5%B9%B46%E6%9C%8818%E6%97%A5_%E4%B8%8B%E5%8D%8806_53_25.png');
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: #1a1525;
    color: var(--text-light);
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }
  img { display: block; max-width: 100%; -webkit-user-drag: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

  /* ════════════════════════════════════════════════════════════════
     🔄 強制橫向:直拿時提示轉橫
  ════════════════════════════════════════════════════════════════ */
  #rotateHint {
    display: none;
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #5E4A78, #8B6FA8);
    z-index: 9999;
    flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 30px;
  }
  #rotateHint .phone {
    font-size: 64px;
    animation: rotatePhone 2s ease-in-out infinite;
    margin-bottom: 20px;
  }
  @keyframes rotatePhone {
    0%, 40% { transform: rotate(0deg); }
    60%, 100% { transform: rotate(90deg); }
  }
  #rotateHint .txt { font-size: 18px; font-weight: 700; letter-spacing: 0.1em; margin-bottom: 8px; }
  #rotateHint .sub { font-size: 13px; opacity: 0.8; }

  /* 直向時顯示提示、藏住遊戲 */
  @media (orientation: portrait) {
    #rotateHint { display: flex; }
    #gameWrap { display: none; }
  }

  /* ════════════════════════════════════════════════════════════════
     🌏 遊戲主容器(橫式滿版)
  ════════════════════════════════════════════════════════════════ */
  #gameWrap {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
    overflow: hidden;
  }

  /* 村莊背景 */
  #village {
    position: absolute; inset: 0;
    background-image: var(--img-village);
    background-size: cover;
    background-position: center;
    transition: transform 0.4s ease, filter 0.3s ease;
  }
  #village.dimmed { filter: brightness(0.5) blur(2px); }

  /* ════════════════════════════════════════════════════════════════
     ☁️ 頂部 HUD（點數 / 譽望 / 主角貓）
  ════════════════════════════════════════════════════════════════ */
  .hud {
    position: absolute;
    top: 14px; left: 14px; right: 14px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    z-index: 50;
    pointer-events: none;
  }
  .hud > * { pointer-events: auto; }

  .hud-left { display: flex; gap: 10px; align-items: center; }
  .hud-pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--panel-bg);
    border: 1.5px solid var(--panel-line);
    border-radius: 18px;
    padding: 7px 14px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(6px);
  }
  .hud-pill .ic { font-size: 16px; }
  .hud-pill .label { font-size: 10px; opacity: 0.75; margin-right: 2px; }
  .hud-pill .val { font-size: 16px; font-weight: 800; color: var(--gold); letter-spacing: 0.02em; }

  .hud-avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 2.5px solid var(--gold);
    background: var(--panel-bg) center/cover;
    box-shadow: var(--shadow);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .hud-avatar:active { transform: scale(0.92); }
  .hud-avatar img { width: 100%; height: 100%; object-fit: cover; }

  .hud-right { display: flex; gap: 8px; align-items: center; }
  .hud-btn {
    background: var(--panel-bg);
    border: 1.5px solid var(--panel-line);
    border-radius: 14px;
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 600;
    box-shadow: var(--shadow);
    backdrop-filter: blur(6px);
    transition: transform 0.15s;
  }
  .hud-btn:active { transform: scale(0.92); }

  /* ════════════════════════════════════════════════════════════════
     🏘️ 建築(村裡的可點區域)
  ════════════════════════════════════════════════════════════════ */
  .buildings {
    position: absolute; inset: 0;
    z-index: 20;
  }
  .building {
    position: absolute;
    cursor: pointer;
    transition: transform 0.2s ease, filter 0.2s ease;
    filter: drop-shadow(0 6px 10px rgba(94,74,120,0.4));
    text-align: center;
  }
  .building:active { transform: scale(0.94); }
  .building:hover { transform: translateY(-4px) scale(1.03); }
  .building img {
    width: 100%;
    height: auto;
    pointer-events: none;
  }
  .building .blabel {
    margin-top: -6px;
    font-size: 12px;
    font-weight: 800;
    color: var(--text-light);
    text-shadow: 0 1px 4px rgba(94,74,120,0.9), 0 0 2px rgba(94,74,120,0.9);
    letter-spacing: 0.05em;
  }

  /* 五棟位置(橫式村莊佈局,百分比定位,自適應) */
  #bHome    { left: 6%;   top: 30%;  width: 17%; }
  #bGacha   { left: 27%;  top: 24%;  width: 16%; }
  #bTemple  { left: 47%;  top: 20%;  width: 17%; }
  #bLounge  { left: 67%;  top: 26%;  width: 18%; }
  #bMailbox { left: 84%;  top: 40%;  width: 14%; }

  /* 主角貓(村中央) */
  #mainCat {
    position: absolute;
    left: 50%; bottom: 8%;
    transform: translateX(-50%);
    z-index: 30;
    width: 90px; height: 90px;
    border-radius: 50%;
    border: 3px solid var(--gold);
    background: rgba(255,255,255,0.5) center/cover;
    box-shadow: 0 6px 16px rgba(94,74,120,0.5);
    cursor: pointer;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    font-size: 44px;
    transition: transform 0.2s;
    animation: floatCat 3s ease-in-out infinite;
  }
  #mainCat:active { transform: translateX(-50%) scale(0.92); }
  #mainCat img { width: 100%; height: 100%; object-fit: cover; }
  @keyframes floatCat {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-8px); }
  }
  .maincat-tag {
    position: absolute;
    left: 50%; bottom: calc(8% + 94px);
    transform: translateX(-50%);
    z-index: 30;
    background: var(--panel-bg);
    border: 1.5px solid var(--panel-line);
    border-radius: 12px;
    padding: 3px 12px;
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
    box-shadow: var(--shadow);
  }

  /* ════════════════════════════════════════════════════════════════
     🪟 區域面板（點建築滑入）
  ════════════════════════════════════════════════════════════════ */
  .panel {
    position: absolute;
    top: 0; right: 0;
    width: 0;
    height: 100%;
    background: var(--panel-bg);
    backdrop-filter: blur(14px);
    border-left: 2px solid var(--panel-line);
    box-shadow: -8px 0 30px rgba(0,0,0,0.3);
    z-index: 100;
    overflow: hidden;
    transition: width 0.35s cubic-bezier(.4,0,.2,1);
  }
  .panel.open { width: min(56%, 560px); }
  .panel-inner {
    width: min(56vw, 560px);
    height: 100%;
    overflow-y: auto;
    padding: 20px 24px 40px;
  }
  .panel-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
    position: sticky; top: 0;
    background: linear-gradient(var(--panel-bg), transparent);
    padding-bottom: 8px;
  }
  .panel-title { font-size: 20px; font-weight: 800; color: var(--gold); letter-spacing: 0.05em; }
  .panel-close {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 1.5px solid var(--panel-line);
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
  }

  /* ════════════════════════════════════════════════════════════════
     🐱 我的小屋:貓圖鑑
  ════════════════════════════════════════════════════════════════ */
  .cats-summary {
    text-align: center; margin-bottom: 14px;
    background: rgba(255,255,255,0.1);
    border-radius: 14px; padding: 12px;
    border: 1px solid var(--panel-line);
  }
  .cats-summary .num { font-size: 24px; font-weight: 800; color: var(--gold); }
  .cats-bar { height: 6px; background: rgba(0,0,0,0.25); border-radius: 3px; margin-top: 8px; overflow: hidden; }
  .cats-bar-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width .5s; }
  .cats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .cat-card {
    aspect-ratio: 3/4; border-radius: 12px; overflow: hidden;
    background: rgba(255,255,255,0.1);
    border: 1px solid var(--panel-line);
    display: flex; flex-direction: column;
    position: relative;
  }
  .cat-card.locked { opacity: 0.4; filter: grayscale(0.7); }
  .cat-img { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 28px; overflow: hidden; }
  .cat-img img { width: 100%; height: 100%; object-fit: cover; }
  .cat-nm { font-size: 10px; text-align: center; padding: 4px 2px; font-weight: 600; }
  .cat-rar { font-size: 8px; padding: 1px 5px; border-radius: 5px; font-weight: 800; display: inline-block; margin: 0 auto 4px; }
  .cat-rar.N { background: rgba(168,152,153,0.3); color: #d8c8c9; }
  .cat-rar.R { background: rgba(185,139,201,0.3); color: #e0b8ec; }
  .cat-rar.SSR { background: rgba(232,199,126,0.3); color: var(--rarity-ssr); }
  .cat-lock { position: absolute; top:50%; left:50%; transform: translate(-50%,-50%); font-size: 22px; opacity: 0.7; }
  .cat-card.clickable { cursor: pointer; }
  .cat-card.clickable:active { transform: scale(0.95); }

  /* ════════════════════════════════════════════════════════════════
     🎰 扭蛋站:抽卡
  ════════════════════════════════════════════════════════════════ */
  .gacha-box { text-align: center; }
  .gacha-machine {
    width: 120px; height: 120px; margin: 6px auto 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 60px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px; border: 1px solid var(--panel-line);
  }
  .gacha-machine.spin { animation: shake .15s infinite; }
  @keyframes shake { 0%,100%{transform:translate(0,0)} 25%{transform:translate(-3px,2px)rotate(-2deg)} 75%{transform:translate(3px,-2px)rotate(2deg)} }
  .gacha-cost { font-size: 13px; margin-bottom: 12px; }
  .gacha-cost b { color: var(--gold); font-size: 18px; }
  .gacha-pools { display: flex; gap: 8px; margin-bottom: 16px; }
  .gacha-pool { flex:1; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 8px 4px; border: 1px solid var(--panel-line); }
  .gacha-pool .t { font-size: 10px; opacity:.8; }
  .gacha-pool .r { font-size: 15px; font-weight: 800; }
  .gacha-pool .n { font-size: 9px; opacity:.7; }
  .gacha-btn {
    width: 100%; padding: 14px; border-radius: 14px;
    background: linear-gradient(135deg, var(--gold), var(--gold-deep));
    color: #fff; font-size: 16px; font-weight: 800; letter-spacing: 0.1em;
    box-shadow: 0 4px 14px rgba(201,166,104,0.4);
    transition: transform .15s;
  }
  .gacha-btn:active { transform: scale(0.97); }
  .gacha-btn:disabled { opacity: 0.4; }
  .gacha-hint { font-size: 11px; opacity: 0.7; margin-top: 8px; }

  /* ════════════════════════════════════════════════════════════════
     🏛️ 榮耀神殿:譽望
  ════════════════════════════════════════════════════════════════ */
  .rep-mine { text-align: center; background: rgba(255,255,255,0.1); border-radius: 16px; padding: 18px; border: 1px solid var(--panel-line); margin-bottom: 14px; }
  .rep-num { font-size: 44px; font-weight: 800; color: var(--gold); line-height: 1; }
  .rep-tier { display: inline-block; margin-top: 10px; padding: 4px 14px; background: rgba(0,0,0,0.2); border-radius: 10px; font-size: 12px; font-weight: 700; }
  .rep-desc { font-size: 11px; opacity: 0.75; margin-top: 10px; }
  .rep-board h4 { font-size: 13px; margin-bottom: 8px; opacity: 0.9; }
  .rep-row { display: flex; align-items: center; padding: 9px 12px; border-radius: 10px; background: rgba(255,255,255,0.06); margin-bottom: 6px; }
  .rep-rank { width: 26px; font-weight: 800; }
  .rep-rank.gold { color: var(--gold); }
  .rep-rname { flex: 1; font-size: 12px; }
  .rep-rscore { font-weight: 700; color: var(--gold); }
  .rep-locked { text-align: center; padding: 28px 12px; opacity: 0.6; }
  .rep-locked .lk { font-size: 32px; margin-bottom: 8px; }

  /* ════════════════════════════════════════════════════════════════
     🛋️ 交誼廳:影片 + 裝飾貓
  ════════════════════════════════════════════════════════════════ */
  .lounge-screen {
    width: 100%; aspect-ratio: 16/9;
    background: #000; border-radius: 14px; overflow: hidden;
    border: 2px solid var(--panel-line); margin-bottom: 12px;
    position: relative;
  }
  .lounge-screen iframe { width: 100%; height: 100%; border: 0; }
  .lounge-screen .novid { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:13px; opacity:0.7; text-align:center; padding:20px; }
  .lounge-ctrl { display: flex; gap: 8px; justify-content: center; margin-bottom: 14px; }
  .lounge-ctrl button { background: rgba(255,255,255,0.12); border: 1px solid var(--panel-line); border-radius: 10px; padding: 8px 14px; font-size: 12px; font-weight: 600; }
  .lounge-seats { display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; }
  .seat-cat {
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(255,255,255,0.15); border: 1.5px solid var(--panel-line);
    display: flex; align-items: center; justify-content: center; font-size: 20px;
    overflow: hidden;
    animation: seatBob 2.5s ease-in-out infinite;
  }
  .seat-cat img { width:100%; height:100%; object-fit: cover; }
  .seat-cat:nth-child(2n) { animation-delay: .4s; }
  .seat-cat:nth-child(3n) { animation-delay: .8s; }
  @keyframes seatBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
  .lounge-label { font-size: 11px; opacity: 0.6; text-align: center; margin-top: 8px; }

  /* ════════════════════════════════════════════════════════════════
     🎁 村口郵筒:賺點/介紹/兌換
  ════════════════════════════════════════════════════════════════ */
  .mail-sect { margin-bottom: 14px; }
  .mail-sect h4 { font-size: 13px; color: var(--gold); margin-bottom: 8px; }
  .mail-item { display: flex; justify-content: space-between; padding: 9px 12px; background: rgba(255,255,255,0.07); border-radius: 10px; margin-bottom: 6px; font-size: 12px; }
  .mail-item .pts { color: var(--gold); font-weight: 700; }
  .mail-btn { width: 100%; padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.12); border: 1px solid var(--panel-line); font-size: 13px; font-weight: 700; margin-top: 6px; }

  /* ════════════════════════════════════════════════════════════════
     抽獎結果 Modal
  ════════════════════════════════════════════════════════════════ */
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
  .modal.show { display: flex; }
  .modal-card {
    background: linear-gradient(160deg, #6a5590, #4a3a62);
    border: 2px solid var(--gold); border-radius: 22px;
    padding: 26px; text-align: center; max-width: 320px; width: 100%;
    animation: pop .5s cubic-bezier(.2,1.2,.4,1);
  }
  @keyframes pop { 0%{transform:scale(.5);opacity:0} 100%{transform:scale(1);opacity:1} }
  .modal-rar { font-size: 13px; font-weight: 800; letter-spacing: 0.2em; margin-bottom: 8px; }
  .modal-img { width: 150px; height: 150px; margin: 10px auto; border-radius: 16px; overflow: hidden; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 70px; }
  .modal-img img { width: 100%; height: 100%; object-fit: cover; }
  .modal-name { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .modal-story { font-size: 12px; opacity: 0.8; margin-bottom: 18px; }
  .modal-btn { padding: 11px 28px; border-radius: 14px; background: var(--gold); color: #fff; font-weight: 700; }

  /* 確認彈窗 */
  .confirm { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:550; align-items:center; justify-content:center; padding:24px; }
  .confirm.show { display:flex; }
  .confirm-card { background: linear-gradient(160deg, #6a5590, #4a3a62); border:2px solid var(--panel-line); border-radius:18px; padding:22px; max-width:300px; width:100%; }
  .confirm-card h4 { font-size:16px; margin-bottom:8px; }
  .confirm-card p { font-size:13px; opacity:0.85; margin-bottom:18px; line-height:1.5; }
  .confirm-btns { display:flex; gap:10px; }
  .confirm-btns button { flex:1; padding:11px; border-radius:11px; font-weight:700; font-size:13px; }
  .cf-cancel { background: rgba(255,255,255,0.12); }
  .cf-ok { background: var(--gold); color:#fff; }

  /* Toast */
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color:#fff; padding: 11px 20px; border-radius: 16px; font-size: 13px; z-index: 600; opacity: 0; transition: opacity .25s; pointer-events: none; max-width: 80%; text-align:center; }
  .toast.show { opacity: 1; }

  /* Loading */
  .loading { position: fixed; inset: 0; background: #1a1525; display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 800; }
  .loading.hide { display: none; }
  .spinner { width: 38px; height: 38px; border: 3px solid rgba(201,166,104,0.25); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-txt { font-size: 13px; opacity: 0.7; }
</style>
</head>
<body>

<!-- 🔄 轉橫提示 -->
<div id="rotateHint">
  <div class="phone">📱</div>
  <div class="txt">請將手機橫放</div>
  <div class="sub">貓咪村是橫式遊戲世界 🐾</div>
</div>

<!-- 🌏 遊戲世界 -->
<div id="gameWrap">
  <div id="village"></div>

  <!-- HUD -->
  <div class="hud">
    <div class="hud-left">
      <div class="hud-avatar" id="hudAvatar">🐱</div>
      <div class="hud-pill">

/* ══════════════════════════════════════════════════════════════════
   LINE Login + UID(沿用三道防線)
══════════════════════════════════════════════════════════════════ */
function getUid(){
  const paramUid = getQ('uid');
  if (paramUid && /^U[a-z0-9]{32}$/i.test(paramUid)){ STATE.uid=paramUid; STATE.loginMethod='param'; return {kind:'uid', uid:paramUid}; }
  const code = getQ('code');
  if (code) return {kind:'code', code:code};
  const cached = localStorage.getItem('uni_village_uid');
  if (cached && /^U[a-z0-9]{32}$/i.test(cached)){ STATE.uid=cached; STATE.loginMethod='cache'; return {kind:'uid', uid:cached}; }
  return {kind:'none'};
}
function startLineLogin(){
  const state = Math.random().toString(36).slice(2);
  sessionStorage.setItem('uni_village_state', state);
  const url = 'https://access.line.me/oauth2/v2.1/authorize'
    + '?response_type=code'
    + '&client_id=' + CONFIG.LINE_LOGIN_CHANNEL_ID
    + '&redirect_uri=' + encodeURIComponent(CONFIG.LINE_LOGIN_CALLBACK)
    + '&state=' + state
    + '&scope=profile%20openid'
    + '&bot_prompt=normal';
  location.href = url;
}
async function handleLineCallback(code){
  if (window.__lineExchanging) return false;
  const doneCode = sessionStorage.getItem('uni_village_code_done');
  if (doneCode === code) return false;
  window.__lineExchanging = true;
  sessionStorage.setItem('uni_village_code_done', code);
  history.replaceState({}, '', location.pathname);
  setLoading(true);
  try {
    const r = await callApi('lineLoginExchange', { code: code, redirect_uri: CONFIG.LINE_LOGIN_CALLBACK });
    if (r && r.ok && r.uid){
      STATE.uid = r.uid; STATE.loginMethod='line';
      localStorage.setItem('uni_village_uid', r.uid);
      await loadData();
      return true;
    } else {
      window.__lineExchanging=false;
      showToast('LINE 登入失敗,請重新登入');
      return false;
    }
  } catch(e){
    console.error(e); window.__lineExchanging=false;
    showToast(TEXTS.ERR_NETWORK); return false;
  } finally { setLoading(false); }
}

/* ══════════════════════════════════════════════════════════════════
   API
══════════════════════════════════════════════════════════════════ */
async function callApi(action, params){
  const url = new URL(CONFIG.POINTS_GAS_URL);
  url.searchParams.set('action', action);
  url.searchParams.set('token', CONFIG.ADMIN_TOKEN);
  if (params) Object.keys(params).forEach(k=>{ if(params[k]!=null) url.searchParams.set(k, params[k]); });
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), BIZ.API_TIMEOUT_MS);
  try {
    const res = await fetch(url.toString(), { method:'GET', signal: ctrl.signal });
    if (!res.ok) throw new Error('HTTP '+res.status);
    return await res.json();
  } catch(err){ console.error('[API '+action+']', err); return null; }
  finally { clearTimeout(timer); }
}

/* ══════════════════════════════════════════════════════════════════
   載入資料
══════════════════════════════════════════════════════════════════ */
async function loadData(){
  if (!STATE.uid){ showToast(TEXTS.ERR_NOT_LOGIN); return; }
  setLoading(true);
  loadCache();
  try {
    const rPts = await callApi('getPoints', { uid: STATE.uid });
    if (rPts && rPts.ok){
      STATE.data.points = (rPts.balance!=null ? rPts.balance : (rPts.points||0));
      STATE.data.reputation = rPts.reputation || 0;
      STATE.data.totalDraws = rPts.totalDraws || 0;
      STATE.data.referralCode = rPts.referralCode || '';
      STATE.data.name = rPts.name || rPts.displayName || TEXTS.GUEST_NAME;
    }
    const rChar = await callApi('getCatsCollection', { uid: STATE.uid });
    if (rChar && rChar.ok && Array.isArray(rChar.cats)){
      STATE.data.catsOwned = rChar.cats;
      STATE.data.mainCatId = rChar.mainCatId || '';
      if (Array.isArray(rChar.catsDetail)){
        STATE.data.catsImgMap = {};
        rChar.catsDetail.forEach(c=>{ if(c&&c.catId){ STATE.data.catsImgMap[String(c.catId)]={ img:String(c.imageUrl||''), story:String(c.story||'') }; } });
      }
    }
    if (BIZ.SHOW_LEADERBOARD){
      const rBoard = await callApi('getReputationBoard', { limit: 10 });
      if (rBoard && rBoard.ok && Array.isArray(rBoard.list)) STATE.data.repBoard = rBoard.list;
    }
    saveCache();
    renderHud();
    renderMainCat();
    if (STATE.curZone) renderPanel(STATE.curZone);
  } catch(e){ console.error(e); showToast(TEXTS.ERR_NETWORK); }
  finally { setLoading(false); }
}
function loadCache(){
  try { const raw=localStorage.getItem(BIZ.STORAGE_KEYS.LAST_DATA);
    if(raw){ const d=JSON.parse(raw); Object.assign(STATE.data, d.data||{}); STATE.history=d.history||[]; renderHud(); renderMainCat(); } } catch(_){}
}
function saveCache(){
  try { localStorage.setItem(BIZ.STORAGE_KEYS.LAST_DATA, JSON.stringify({ data:STATE.data, history:STATE.history, ts:Date.now() })); } catch(_){}
}

/* —— 🏠 我的小屋 —— */
function renderHome(){
  const owned = new Set(STATE.data.catsOwned||[]);
  const collected = (STATE.data.catsOwned||[]).length;
  let grid = '';
  BIZ.CATS.forEach(cat=>{
    const isOwned = owned.has(cat.id);
    const detail = STATE.data.catsImgMap[cat.id];
    const realUrl = detail ? detail.img : '';
    const inner = !isOwned
      ? `<div class="cat-lock">🔒</div>`
      : (realUrl
          ? `<img src="${realUrl}" alt="${cat.name}" onerror="this.outerHTML='<span style=\\'font-size:28px\\'>${cat.emoji}</span>'">`
          : `<span style="font-size:28px">${cat.emoji}</span>`);
    grid += `
      <div class="cat-card ${isOwned?'clickable':'locked'}" ${isOwned?`data-cat="${cat.id}"`:''}>
        <div class="cat-img">${inner}</div>
        <div style="text-align:center">
          <div class="cat-nm">${isOwned?cat.name:'???'}</div>
          <span class="cat-rar ${cat.rarity}">${cat.rarity}</span>
        </div>
      </div>`;
  });
  return `
    <div class="cats-summary">
      <div>已收集 <span class="num">${collected}</span> / 12 隻</div>

}

    ? `<div class="lounge-ctrl"><button id="vPrev">⏮ 上一支</button><button id="vNext">下一支 ⏭</button></div>`
    : '';
  // 裝飾貓座位:用已擁有的貓,沒有就用全 12 emoji
  const owned = STATE.data.catsOwned||[];
  const seatCats = owned.length>0
    ? owned.map(id=>{ const d=STATE.data.catsImgMap[id]; const c=BIZ.CATS.find(x=>x.id===id);
        return d&&d.img ? `<div class="seat-cat"><img src="${d.img}"></div>` : `<div class="seat-cat">${c?c.emoji:'🐱'}</div>`; }).join('')
    : BIZ.CATS.slice(0,8).map(c=>`<div class="seat-cat">${c.emoji}</div>`).join('');
  return `
    ${screen}
    ${ctrl}
    <div class="lounge-seats">${seatCats}</div>
    <div class="lounge-label">🐾 村民們一起看店家影片</div>`;
}
function initLounge(){
  // 影片切換綁定在 bindPanelEvents
}

/* —— 🎁 村口郵筒 —— */
function renderMailbox(){
  const earn = TEXTS.HOW_EARN.map(([a,b])=>`<div class="mail-item"><span>${a}</span><span class="pts">+${b}</span></div>`).join('');
  const exch = TEXTS.EXCHANGE.map(([a,b])=>`<div class="mail-item"><span>${a}</span><span>${b}</span></div>`).join('');
  const code = STATE.data.referralCode || '';
  return `
    <div class="mail-sect">
      <h4>💎 怎麼累積點數</h4>
      ${earn}
    </div>
    <div class="mail-sect">
      <h4>💱 點數兌換</h4>
      ${exch}
    </div>
    <div class="mail-sect">
      <h4>🎟 我的介紹卡</h4>
      <div class="mail-item"><span>邀請碼</span><span class="pts">${code||'聯絡 Elsa 開通'}</span></div>
      ${code?`<button class="mail-btn" id="copyRef">複製邀請碼</button>`:''}
    </div>
    <div class="mail-sect">
      <h4>💬 聯絡 Elsa</h4>
      <button class="mail-btn" id="contactBtn">開啟 LINE 對話</button>
    </div>`;
}

/* ══════════════════════════════════════════════════════════════════
   面板內事件
══════════════════════════════════════════════════════════════════ */
function bindPanelEvents(zone){
  if (zone==='home'){
    document.querySelectorAll('.cat-card.clickable').forEach(el=>{
      el.addEventListener('click', ()=> setMainCat(el.dataset.cat));
    });
  }
  if (zone==='gacha'){
    const btn = $('gachaBtn');
    if (btn) btn.addEventListener('click', ()=>{
      openConfirm('確認扭蛋?', '將消耗 99 點 · A賞5% / B賞15% / C賞80%', doDraw);
    });
  }
  if (zone==='lounge'){
    const vids = BIZ.LOUNGE_VIDEOS.filter(v=>v&&v.trim());
    const prev=$('vPrev'), next=$('vNext');
    if (next) next.addEventListener('click', ()=>{ STATE.videoIdx=(STATE.videoIdx+1)%vids.length; renderPanel('lounge'); });
    if (prev) prev.addEventListener('click', ()=>{ STATE.videoIdx=(STATE.videoIdx-1+vids.length)%vids.length; renderPanel('lounge'); });
  }
  if (zone==='mailbox'){
    const cp=$('copyRef'); if(cp) cp.addEventListener('click', ()=>{ navigator.clipboard?.writeText(STATE.data.referralCode||'').then(()=>showToast('已複製邀請碼')); });
    const ct=$('contactBtn'); if(ct) ct.addEventListener('click', ()=>{ location.href=CONFIG.LINE_OA_URL; });
  }
}

/* ══════════════════════════════════════════════════════════════════
   切換主角貓(後端 setMainCharacter,5點)
══════════════════════════════════════════════════════════════════ */
function setMainCat(catId){
  const cat = BIZ.CATS.find(c=>c.id===catId);
  if (!cat) return;
  if (STATE.data.mainCatId === catId){ showToast(cat.name+' 已經是你的主角貓了'); return; }
  openConfirm('設為主角貓?', `要把「${cat.name}」設為主角貓嗎?(消耗 5 點)`, async ()=>{
    const r = await callApi('setMainCharacter', { uid: STATE.uid, charId: catId });
    if (r && r.ok){
      STATE.data.mainCatId = catId;
      if (r.balance!=null) STATE.data.points = r.balance;
      saveCache(); renderHud(); renderMainCat();
      showToast('主角貓換成 '+cat.name+' 🐾');
    } else {
      showToast(r&&r.msg ? r.msg : '切換失敗,點數可能不足');
    }
  });
}

/* ══════════════════════════════════════════════════════════════════
   抽卡
══════════════════════════════════════════════════════════════════ */
async function doDraw(){
  if ((STATE.data.points||0) < BIZ.DRAW_COST){ showToast(TEXTS.ERR_NOT_ENOUGH); return; }
  const machine = $('gachaMachine'); const btn = $('gachaBtn');
  if (machine) machine.classList.add('spin');
  if (btn) btn.disabled = true;
  const r = await callApi('drawCharacter', { uid: STATE.uid });
  await new Promise(res=>setTimeout(res, 1800));
  if (machine) machine.classList.remove('spin');
  if (!r || !r.ok){ showToast(r&&r.msg?r.msg:TEXTS.ERR_NETWORK); if(btn)btn.disabled=false; return; }

  const ch = r.character || {};
  const newPts = (r.balance!=null ? r.balance : r.points);
  if (newPts!=null) STATE.data.points = newPts;
  STATE.data.totalDraws = (STATE.data.totalDraws||0)+1;
  if (ch.charId && !STATE.data.catsOwned.includes(ch.charId)) STATE.data.catsOwned.push(ch.charId);
  STATE.history.unshift({ time:new Date().toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}), rarity:ch.rarity||'N', name:ch.charName||ch.name||'?' });
  saveCache();
  renderHud(); renderMainCat();
  if (STATE.curZone==='gacha') renderPanel('gacha');
  showDrawResult(ch);
}
function showDrawResult(ch){
  const r = ch.rarity || 'N';
  $('drawRar').textContent = TEXTS.DRAW_TITLES[r] || r;
  $('drawRar').style.color = r==='SSR'?'var(--rarity-ssr)':(r==='R'?'var(--rarity-r)':'var(--rarity-n)');
  $('drawName').textContent = ch.charName || ch.name || '神秘貓咪';
  const detail = STATE.data.catsImgMap[ch.charId];
  $('drawStory').textContent = (detail&&detail.story) ? detail.story : (ch.story||'');
  const cat = BIZ.CATS.find(c=>c.id===ch.charId) || {};
  const realUrl = ch.imageUrl || (detail&&detail.img) || '';
  $('drawImg').innerHTML = realUrl
    ? `<img src="${realUrl}" onerror="this.outerHTML='<span style=\\'font-size:70px\\'>${cat.emoji||'🐱'}</span>'">`
    : `<span style="font-size:70px">${cat.emoji||'🐱'}</span>`;
  $('drawModal').classList.add('show');
}

/* ══════════════════════════════════════════════════════════════════
   登出
══════════════════════════════════════════════════════════════════ */
function doLogout(){
  openConfirm('切換帳號', '要登出目前帳號嗎?下次需重新用 LINE 登入 🐾', ()=>{
    localStorage.removeItem('uni_village_uid');
    sessionStorage.removeItem('uni_village_code_done');
    sessionStorage.removeItem('uni_village_state');
    window.__lineExchanging=false;
    STATE.uid=''; STATE.loginMethod='';
    location.replace(location.pathname);
  });
}

/* ══════════════════════════════════════════════════════════════════
   事件綁定
══════════════════════════════════════════════════════════════════ */
function bindEvents(){
  document.querySelectorAll('.building').forEach(b=>{
    b.addEventListener('click', ()=> openZone(b.dataset.zone));
  });
  $('panelClose').addEventListener('click', closeZone);
  $('mainCat').addEventListener('click', ()=> openZone('home'));
  $('hudAvatar').addEventListener('click', ()=> openZone('home'));
  $('switchAccBtn').addEventListener('click', doLogout);
  $('drawClose').addEventListener('click', ()=> $('drawModal').classList.remove('show'));
}

/* ══════════════════════════════════════════════════════════════════
   啟動
══════════════════════════════════════════════════════════════════ */
async function init(){
  bindEvents();
  const r = getUid();
  if (r.kind==='uid'){ await loadData(); setLoading(false); return; }
  if (r.kind==='code'){
    const ok = await handleLineCallback(r.code);
    if (!ok){ setLoading(false); openConfirm('進入貓咪村', '需要 LINE 登入才能進村查看你的點數和貓咪 🐾', startLineLogin); }
    else setLoading(false);
    return;
  }
  setLoading(false);
  openConfirm('進入貓咪村', '需要 LINE 登入才能進村查看你的點數和貓咪 🐾', startLineLogin);
}
document.addEventListener('DOMContentLoaded', init);
</script>
