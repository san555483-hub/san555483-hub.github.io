    if(r&&r.ok&&r.uid){ STATE.uid=r.uid; STATE.loginMethod='line'; localStorage.setItem('uni_village_uid',r.uid); await loadData(); return true; }
    window.__lineExchanging=false; showToast('LINE 登入失敗,請重新登入'); return false;
  }catch(e){ console.error(e); window.__lineExchanging=false; showToast(TEXTS.ERR_NETWORK); return false; } finally{ setLoading(false); }
}
async function callApi(action,params){
  const url=new URL(CONFIG.POINTS_GAS_URL); url.searchParams.set('action',action); url.searchParams.set('token',CONFIG.ADMIN_TOKEN);
  if(params) Object.keys(params).forEach(k=>{ if(params[k]!=null) url.searchParams.set(k,params[k]); });
  const ctrl=new AbortController(); const timer=setTimeout(()=>ctrl.abort(),BIZ.API_TIMEOUT_MS);
  try{ const res=await fetch(url.toString(),{method:'GET',signal:ctrl.signal}); if(!res.ok) throw new Error('HTTP '+res.status); return await res.json(); }
  catch(err){ console.error('[API '+action+']',err); return null; } finally{ clearTimeout(timer); }
}
async function loadData(){
  if(!STATE.uid) return; setLoading(true); loadCache();
  try{
    const rPts=await callApi('getPoints',{uid:STATE.uid});
    if(rPts&&rPts.ok){ STATE.data.points=(rPts.balance!=null?rPts.balance:(rPts.points||0)); STATE.data.reputation=rPts.reputation||0; STATE.data.totalDraws=rPts.totalDraws||0; STATE.data.referralCode=rPts.referralCode||''; STATE.data.name=rPts.name||rPts.displayName||TEXTS.GUEST_NAME; }
    const rChar=await callApi('getCatsCollection',{uid:STATE.uid});
    if(rChar&&rChar.ok&&Array.isArray(rChar.cats)){ STATE.data.catsOwned=rChar.cats; STATE.data.mainCatId=rChar.mainCatId||'';
      if(Array.isArray(rChar.catsDetail)){ STATE.data.catsImgMap={}; rChar.catsDetail.forEach(c=>{ if(c&&c.catId) STATE.data.catsImgMap[String(c.catId)]={img:String(c.imageUrl||''),story:String(c.story||'')}; }); } }
    if(BIZ.SHOW_LEADERBOARD){ const rB=await callApi('getReputationBoard',{limit:10}); if(rB&&rB.ok&&Array.isArray(rB.list)) STATE.data.repBoard=rB.list; }
    saveCache(); renderHud(); updatePlayerCatTexture(); if(STATE.curZone) renderInterior(STATE.curZone);
  }catch(e){ console.error(e); showToast(TEXTS.ERR_NETWORK); } finally{ setLoading(false); }
}
function loadCache(){ try{ const raw=localStorage.getItem(BIZ.STORAGE_KEY); if(raw){ const d=JSON.parse(raw); Object.assign(STATE.data,d.data||{}); STATE.history=d.history||[]; renderHud(); } }catch(_){} }
function saveCache(){ try{ localStorage.setItem(BIZ.STORAGE_KEY,JSON.stringify({data:STATE.data,history:STATE.history,ts:Date.now()})); }catch(_){} }
function renderHud(){
  $('hudPoints').textContent=(STATE.data.points||0).toLocaleString(); $('hudRep').textContent=STATE.data.reputation||0;
  const mc=STATE.data.mainCatId, av=$('hudAvatar');
  if(mc&&STATE.data.catsImgMap[mc]&&STATE.data.catsImgMap[mc].img){ av.innerHTML=`<img src="${STATE.data.catsImgMap[mc].img}">`; } else{ const cat=BIZ.CATS.find(c=>c.id===mc); av.textContent=cat?cat.emoji:'🐱'; }
}

let GAME=null, GScene=null, player=null, buildings=[], nearBld=null;
const joy={active:false,dx:0,dy:0};
function buildGame(){
  const host=$('gameHost'); const W=host.clientWidth, H=host.clientHeight;
  const sceneObj={
    preload:function(){
      this.load.crossOrigin='anonymous';
      this.load.image('bg',IMG.village); this.load.image('home',IMG.home); this.load.image('gacha',IMG.gacha);
      this.load.image('temple',IMG.temple); this.load.image('lounge',IMG.lounge); this.load.image('mailbox',IMG.mailbox);
      Object.keys(STATE.data.catsImgMap||{}).forEach(id=>{ const u=STATE.data.catsImgMap[id].img; if(u) this.load.image('cat_'+id,u); });
      this.load.image('cat_default',IMG.home);
    },
    create:function(){
      GScene=this;
      const bg=this.add.image(W/2,H/2,'bg'); const bs=Math.max(W/bg.width,H/bg.height); bg.setScale(bs);
      const mk=(key,x,y,w,zone,name)=>{ const b=this.add.image(W*x,H*y,key); b.setScale((W*w)/b.width); b.setData('zone',zone); b.setData('name',name); return b; };
      buildings=[ mk('home',0.12,0.34,0.15,'home','我的小屋'), mk('gacha',0.32,0.26,0.15,'gacha','扭蛋站'), mk('temple',0.52,0.24,0.16,'temple','榮耀神殿'), mk('lounge',0.72,0.30,0.18,'lounge','交誼廳'), mk('mailbox',0.90,0.42,0.13,'mailbox','村口郵筒') ];
      const ptex=playerTexKey(this); player=this.add.image(W*0.5,H*0.78,ptex); player.setScale((W*0.085)/player.width); player.setDepth(20);
      this.cursors=this.input.keyboard.createCursorKeys();
      // 🎮 WASD 鍵（遊戲常用移動鍵，與方向鍵並存）
      this.wasd=this.input.keyboard.addKeys({up:'W',left:'A',down:'S',right:'D'});
      STATE.phaserReady=true;
    },
    update:function(){
      if(!player) return; const sp=2.6; let mx=0,my=0;
      // 📱 手機虛擬搖桿（原樣保留）
      if(joy.active){ mx=joy.dx; my=joy.dy; }
      // 💻 鍵盤：方向鍵 + WASD 都吃，累加可斜向走
      const c=this.cursors, w=this.wasd;
      if(c.left.isDown  || (w&&w.left.isDown))  mx-=1;
      if(c.right.isDown || (w&&w.right.isDown)) mx+=1;
      if(c.up.isDown    || (w&&w.up.isDown))    my-=1;
      if(c.down.isDown  || (w&&w.down.isDown))  my+=1;
      // 斜向正規化：避免斜走比直走快（向量長度 >1 才縮）
      const mag=Math.hypot(mx,my); if(mag>1){ mx/=mag; my/=mag; }
      const moving=(mx!==0||my!==0);
      if(moving){ player.x+=mx*sp; player.y+=my*sp; if(mx<-0.1) player.setFlipX(true); if(mx>0.1) player.setFlipX(false); player.y+=Math.sin(this.time.now/90)*0.5; }
      player.x=Phaser.Math.Clamp(player.x,20,W-20); player.y=Phaser.Math.Clamp(player.y,H*0.12,H-20);
      let found=null; buildings.forEach(b=>{ const d=Phaser.Math.Distance.Between(player.x,player.y,b.x,b.y); if(d<b.displayWidth*0.5){ found=b; } });
      if(found!==nearBld){ nearBld=found; const eb=$('enterBtn'); if(nearBld){ eb.textContent='進入 '+nearBld.getData('name')+' 🚪'; eb.classList.add('show'); } else eb.classList.remove('show'); }
    }
  };
  GAME=new Phaser.Game({type:Phaser.AUTO,width:W,height:H,parent:'gameHost',transparent:true,scene:sceneObj});
}
function playerTexKey(scene){ const mc=STATE.data.mainCatId; if(mc&&scene.textures.exists('cat_'+mc)) return 'cat_'+mc; return 'cat_default'; }
function updatePlayerCatTexture(){
  if(!GScene||!player) return; const mc=STATE.data.mainCatId;
  if(mc&&STATE.data.catsImgMap[mc]&&STATE.data.catsImgMap[mc].img){ const key='cat_'+mc;
    if(GScene.textures.exists(key)){ player.setTexture(key); player.setScale((GScene.scale.width*0.085)/player.width); }
    else{ GScene.load.image(key,STATE.data.catsImgMap[mc].img); GScene.load.once('complete',()=>{ player.setTexture(key); player.setScale((GScene.scale.width*0.085)/player.width); }); GScene.load.start(); } }
}
function initJoystick(){
  const js=$('joystick'), stick=$('joyStick'); const R=35;
  function move(px,py){ const r=js.getBoundingClientRect(); let dx=px-(r.left+60), dy=py-(r.top+60); const dist=Math.hypot(dx,dy); if(dist>R){ dx=dx/dist*R; dy=dy/dist*R; } stick.style.left=(35+dx)+'px'; stick.style.top=(35+dy)+'px'; joy.dx=dx/R; joy.dy=dy/R; joy.active=true; }
  function end(){ stick.style.left='35px'; stick.style.top='35px'; joy.active=false; joy.dx=0; joy.dy=0; }
  js.addEventListener('touchstart',e=>{ e.preventDefault(); move(e.touches[0].clientX,e.touches[0].clientY); },{passive:false});
  js.addEventListener('touchmove',e=>{ e.preventDefault(); move(e.touches[0].clientX,e.touches[0].clientY); },{passive:false});
  js.addEventListener('touchend',e=>{ e.preventDefault(); end(); },{passive:false});
  js.addEventListener('mousedown',e=>{ move(e.clientX,e.clientY); const mm=ev=>move(ev.clientX,ev.clientY); const mu=()=>{ end(); document.removeEventListener('mousemove',mm); document.removeEventListener('mouseup',mu); }; document.addEventListener('mousemove',mm); document.addEventListener('mouseup',mu); });
}
const ZONE = { home:{title:'🏠 我的小屋',bg:IMG.home}, gacha:{title:'🎰 扭蛋站',bg:IMG.gacha}, temple:{title:'🏛️ 榮耀神殿',bg:IMG.temple}, lounge:{title:'🛋️ 交誼廳',bg:IMG.lounge}, mailbox:{title:'🎁 村口郵筒',bg:IMG.mailbox} };
function enterZone(zone){ STATE.curZone=zone; const z=ZONE[zone]; $('intTitle').textContent=z.title; $('interiorBg').style.backgroundImage=`url('${z.bg}')`; renderInterior(zone); $('interior').classList.add('show'); if(GAME&&GAME.scene&&GAME.scene.scenes[0]) GAME.scene.scenes[0].scene.pause(); }
function exitZone(){ STATE.curZone=''; $('interior').classList.remove('show'); const lf=$('loungeFrame'); if(lf) lf.src=lf.src; if(GAME&&GAME.scene&&GAME.scene.scenes[0]) GAME.scene.scenes[0].scene.resume(); }
function renderInterior(zone){ const body=$('intBody'); if(zone==='home') body.innerHTML=renderHome(); else if(zone==='gacha') body.innerHTML=renderGacha(); else if(zone==='temple') body.innerHTML=renderTemple(); else if(zone==='lounge') body.innerHTML=renderLounge(); else if(zone==='mailbox') body.innerHTML=renderMailbox(); bindInterior(zone); }
function renderHome(){
  const owned=new Set(STATE.data.catsOwned||[]); const collected=(STATE.data.catsOwned||[]).length; let grid='';
  BIZ.CATS.forEach(cat=>{ const isO=owned.has(cat.id); const det=STATE.data.catsImgMap[cat.id]; const url=det?det.img:''; const isMain=STATE.data.mainCatId===cat.id;
    const inner=!isO?`<div class="clock">🔒</div>`:(url?`<img src="${url}" onerror="this.outerHTML='<span style=\\'font-size:26px\\'>${cat.emoji}</span>'">`:`<span style="font-size:26px">${cat.emoji}</span>`);
    grid+=`<div class="ccard ${isO?'clickable':'locked'} ${isMain?'main':''}" ${isO?`data-cat="${cat.id}"`:''}>${isMain?'<div class="cmaintag">主角</div>':''}<div class="cimg">${inner}</div><div style="text-align:center"><div class="cnm">${isO?cat.name:'???'}</div><span class="crar ${cat.rarity}">${cat.rarity}</span></div></div>`; });
  return `<div class="cats-sum"><div>已收集 <span class="n">${collected}</span> / 12 隻</div><div class="cbar"><div class="cbar-f" style="width:${collected/12*100}%"></div></div><div style="font-size:11px;opacity:.7;margin-top:8px">點亮的貓可點選設為主角 🐾</div></div><div class="cgrid">${grid}</div>`;
}
function renderGacha(){ const enough=(STATE.data.points||0)>=BIZ.DRAW_COST; return `<div class="gbox"><div class="gmach" id="gmach">🎰</div><div class="gcost">消耗 <b>99</b> 點 · 抽一隻貓回村</div><div class="gpools"><div class="gpool"><div class="t">A賞</div><div class="r" style="color:var(--rarity-ssr)">5%</div><div class="nn">SSR</div></div><div class="gpool"><div class="t">B賞</div><div class="r" style="color:var(--rarity-r)">15%</div><div class="nn">R</div></div><div class="gpool"><div class="t">C賞</div><div class="r">80%</div><div class="nn">N</div></div></div><button class="gbtn" id="gbtn" ${enough?'':'disabled'}>${enough?'立即扭蛋':'點數不足'}</button><div class="ghint">目前持有 ${STATE.data.points||0} 點</div></div>`; }
function renderTemple(){
  const rep=STATE.data.reputation||0; let tier=BIZ.REP_TIERS[0].name; for(let i=BIZ.REP_TIERS.length-1;i>=0;i--){ if(rep>=BIZ.REP_TIERS[i].min){ tier=BIZ.REP_TIERS[i].name; break; } }
  let board; if(!BIZ.SHOW_LEADERBOARD){ board=`<div class="rlock"><div class="lk">🔒</div><div>排行榜尚未開放</div></div>`; } else{ const list=STATE.data.repBoard||[]; board=list.length===0?`<div class="rlock">尚無資料</div>`:list.map((row,i)=>`<div class="rrow"><div class="rrank ${i<3?'gold':''}">${i+1}</div><div class="rname">${row.uidMasked||row.name||'匿名'}</div><div class="rscore">${row.score||row.reputation||0}</div></div>`).join(''); }
  return `<div class="rmine"><div style="font-size:12px;opacity:.8">我的譽望</div><div class="rnum">${rep}</div><div class="rtier">${tier}</div><div class="rdesc">介紹朋友 / 完成消費 / 守時都會加分</div></div><div class="rboard"><h4>譽望排行榜</h4>${board}</div>`;
}
function renderLounge(){
  const vids=BIZ.LOUNGE_VIDEOS.filter(v=>v&&v.trim()); let screen;
  if(vids.length===0){ screen=`<div class="lscreen"><div class="nov">🎬 店家頻道即將上線<br><span style="font-size:11px;opacity:.7">(影片在程式 LOUNGE_VIDEOS 填入)</span></div></div>`; }
  else{ const f=vids[STATE.videoIdx%vids.length]; screen=`<div class="lscreen"><iframe id="loungeFrame" src="https://www.youtube.com/embed/${f}?rel=0" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe></div>`; }
  const ctrl=vids.length>1?`<div class="lctrl"><button id="vPrev">⏮ 上一支</button><button id="vNext">下一支 ⏭</button></div>`:'';
  const owned=STATE.data.catsOwned||[]; const seats=owned.length>0?owned.map(id=>{ const d=STATE.data.catsImgMap[id]; const c=BIZ.CATS.find(x=>x.id===id); return d&&d.img?`<div class="seat"><img src="${d.img}"></div>`:`<div class="seat">${c?c.emoji:'🐱'}</div>`; }).join(''):BIZ.CATS.slice(0,8).map(c=>`<div class="seat">${c.emoji}</div>`).join('');
  return `${screen}${ctrl}<div class="lseats">${seats}</div><div class="llabel">🐾 村民們一起看店家影片</div>`;
}
function renderMailbox(){
  const earn=TEXTS.HOW_EARN.map(([a,b])=>`<div class="mitem"><span>${a}</span><span class="pts">+${b}</span></div>`).join(''); const exch=TEXTS.EXCHANGE.map(([a,b])=>`<div class="mitem"><span>${a}</span><span>${b}</span></div>`).join(''); const code=STATE.data.referralCode||'';
  return `<div class="msect"><h4>💎 怎麼累積點數</h4>${earn}</div><div class="msect"><h4>💱 點數兌換</h4>${exch}</div><div class="msect"><h4>🎟 我的介紹卡</h4><div class="mitem"><span>邀請碼</span><span class="pts">${code||'聯絡 Elsa 開通'}</span></div>${code?`<button class="mbtn" id="copyRef">複製邀請碼</button>`:''}</div><div class="msect"><h4>💬 聯絡 Elsa</h4><button class="mbtn" id="contactBtn">開啟 LINE 對話</button></div>`;
}
function bindInterior(zone){
  if(zone==='home'){ document.querySelectorAll('.ccard.clickable').forEach(el=>el.addEventListener('click',()=>setMainCat(el.dataset.cat))); }
  if(zone==='gacha'){ const b=$('gbtn'); if(b) b.addEventListener('click',()=>openConfirm('確認扭蛋?','將消耗 99 點 · A賞5% / B賞15% / C賞80%',doDraw)); }
  if(zone==='lounge'){ const vids=BIZ.LOUNGE_VIDEOS.filter(v=>v&&v.trim()); const pv=$('vPrev'),nx=$('vNext'); if(nx) nx.addEventListener('click',()=>{ STATE.videoIdx=(STATE.videoIdx+1)%vids.length; renderInterior('lounge'); }); if(pv) pv.addEventListener('click',()=>{ STATE.videoIdx=(STATE.videoIdx-1+vids.length)%vids.length; renderInterior('lounge'); }); }
  if(zone==='mailbox'){ const cp=$('copyRef'); if(cp) cp.addEventListener('click',()=>navigator.clipboard?.writeText(STATE.data.referralCode||'').then(()=>showToast('已複製邀請碼'))); const ct=$('contactBtn'); if(ct) ct.addEventListener('click',()=>location.href=CONFIG.LINE_OA_URL); }
}
function setMainCat(catId){
  const cat=BIZ.CATS.find(c=>c.id===catId); if(!cat) return;
  if(STATE.data.mainCatId===catId){ showToast(cat.name+' 已經是你的主角貓了'); return; }
  openConfirm('設為主角貓?',`要把「${cat.name}」設為主角貓嗎?(消耗 5 點)`,async()=>{
    const r=await callApi('setMainCharacter',{uid:STATE.uid,charId:catId});
    if(r&&r.ok){ STATE.data.mainCatId=catId; if(r.balance!=null) STATE.data.points=r.balance; saveCache(); renderHud(); updatePlayerCatTexture(); renderInterior('home'); showToast('主角貓換成 '+cat.name+' 🐾'); }
    else showToast(r&&r.msg?r.msg:'切換失敗,點數可能不足');
  });
}
async function doDraw(){
  if((STATE.data.points||0)<BIZ.DRAW_COST){ showToast(TEXTS.ERR_NOT_ENOUGH); return; }
  const m=$('gmach'),b=$('gbtn'); if(m) m.classList.add('spin'); if(b) b.disabled=true;
  const r=await callApi('drawCharacter',{uid:STATE.uid}); await new Promise(res=>setTimeout(res,1800)); if(m) m.classList.remove('spin');
  if(!r||!r.ok){ showToast(r&&r.msg?r.msg:TEXTS.ERR_NETWORK); if(b) b.disabled=false; return; }
  const ch=r.character||{}; const np=(r.balance!=null?r.balance:r.points); if(np!=null) STATE.data.points=np; STATE.data.totalDraws=(STATE.data.totalDraws||0)+1;
  if(ch.charId&&!STATE.data.catsOwned.includes(ch.charId)) STATE.data.catsOwned.push(ch.charId);
  STATE.history.unshift({time:new Date().toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}),rarity:ch.rarity||'N',name:ch.charName||ch.name||'?'});
  saveCache(); renderHud(); if(STATE.curZone==='gacha') renderInterior('gacha'); showDrawResult(ch);
}
function showDrawResult(ch){
  const r=ch.rarity||'N'; $('drawRar').textContent=TEXTS.DRAW_TITLES[r]||r; $('drawRar').style.color=r==='SSR'?'var(--rarity-ssr)':(r==='R'?'var(--rarity-r)':'var(--rarity-n)');
  $('drawName').textContent=ch.charName||ch.name||'神秘貓咪'; const det=STATE.data.catsImgMap[ch.charId]; $('drawStory').textContent=(det&&det.story)?det.story:(ch.story||'');
  const cat=BIZ.CATS.find(c=>c.id===ch.charId)||{}; const url=ch.imageUrl||(det&&det.img)||'';
  $('drawImg').innerHTML=url?`<img src="${url}" onerror="this.outerHTML='<span style=\\'font-size:70px\\'>${cat.emoji||'🐱'}</span>'">`:`<span style="font-size:70px">${cat.emoji||'🐱'}</span>`;
  $('drawModal').classList.add('show');
}
function doLogout(){ openConfirm('切換帳號','要登出目前帳號嗎?下次需重新用 LINE 登入 🐾',()=>{ localStorage.removeItem('uni_village_uid'); sessionStorage.removeItem('uni_village_code_done'); sessionStorage.removeItem('uni_village_state'); window.__lineExchanging=false; STATE.uid=''; STATE.loginMethod=''; location.replace(location.pathname); }); }
function bindEvents(){
  $('enterBtn').addEventListener('click',()=>{ if(nearBld) enterZone(nearBld.getData('zone')); });
  $('intBack').addEventListener('click',exitZone);
  $('switchAccBtn').addEventListener('click',doLogout);
  $('drawClose').addEventListener('click',()=>$('drawModal').classList.remove('show'));
  $('hudAvatar').addEventListener('click',()=>enterZone('home'));
}
async function init(){
  bindEvents(); initJoystick(); const r=getUid();
  if(r.kind==='uid'){ await loadData(); buildGame(); setLoading(false); return; }
  if(r.kind==='code'){ const ok=await handleLineCallback(r.code); if(!ok){ setLoading(false); openConfirm('進入貓咪村','需要 LINE 登入才能進村 🐾',startLineLogin); } else { buildGame(); setLoading(false); } return; }
  setLoading(false); openConfirm('進入貓咪村','需要 LINE 登入才能進村查看你的點數和貓咪 🐾',startLineLogin);
}
document.addEventListener('DOMContentLoaded',init);
</script>
