<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UNI 廠商系統 - 設定密碼</title>
<style>
:root { --c-bg:#f5f5f7; --c-card:#fff; --c-primary:#d4a574; --c-primary-dark:#b8895a; --c-text:#2c2c2e; --c-soft:#6e6e73; --c-border:#e5e5ea; --c-success:#34c759; --c-warning:#ff9500; --c-danger:#ff3b30; --r:12px; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif; background:var(--c-bg); color:var(--c-text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
.card { background:var(--c-card); border-radius:var(--r); padding:32px 28px; box-shadow:0 4px 20px rgba(0,0,0,0.06); width:100%; max-width:420px; }
.card h1 { font-size:20px; text-align:center; margin-bottom:6px; }
.card .sub { text-align:center; color:var(--c-soft); font-size:13px; margin-bottom:24px; }
.vid-badge { background:#fff4e6; color:#ff9500; padding:8px 16px; border-radius:8px; font-weight:600; text-align:center; margin-bottom:20px; font-size:14px; }
input { width:100%; padding:12px; border:1px solid var(--c-border); border-radius:8px; margin-bottom:10px; font-size:15px; font-family:inherit; }
.btn { width:100%; background:var(--c-primary); color:#fff; padding:12px; border-radius:8px; font-weight:600; font-size:15px; border:none; cursor:pointer; }
.btn:disabled { background:#ccc; cursor:not-allowed; }
.tip { font-size:12px; color:var(--c-soft); margin-bottom:14px; line-height:1.6; }
.msg { padding:10px; border-radius:8px; margin-top:12px; font-size:13px; line-height:1.6; }
.msg.err { background:#ffe6e6; color:var(--c-danger); }
.msg.ok { background:#e6f9ed; color:var(--c-success); }
.msg.warn { background:#fff4e6; color:var(--c-warning); }
.loading { text-align:center; padding:40px; color:var(--c-soft); }
.status-box { text-align:center; padding:24px 16px; }
.status-box .icon { font-size:42px; margin-bottom:12px; }
.status-box h2 { font-size:17px; margin-bottom:8px; }
.status-box p { font-size:13px; color:var(--c-soft); line-height:1.8; }
.retry-link { display:inline-block; margin-top:14px; color:var(--c-primary-dark); font-size:13px; text-decoration:underline; cursor:pointer; background:none; border:none; }
</style>
</head>
<body>
<div class="card">
  <h1>🔑 設定登入密碼</h1>
  <div class="sub">UNI 廠商系統</div>
  <div id="content"><div class="loading">載入中...</div></div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// 🟡 設密碼頁 v2 — 雙模式
//   模式 A(原有):網址帶 ?token=xxx&vid=Vxx → token 驗證設密碼
//   模式 B(新增):無 token → 廠商輸 email 自助查審核狀態 + 設密碼
//                 審核中 → 擋；已核准 → 設密碼；拒絕/中止 → 提示聯繫
// ════════════════════════════════════════════════════════════════
const CONFIG = {
  GAS_URL:    'https://script.google.com/macros/s/AKfycbwFrgxIZo9gWeHkakxYDBaOxHxeVruN2UhEExTTDe5b0Q8WFWWQx6gGzXVdajMc2Zd9iA/exec',
  PORTAL_URL: 'https://san555483-hub.github.io/vendor/vendor-portal.html',
};

const params = new URLSearchParams(location.search);
const token = params.get('token');
const vid   = params.get('vid');

let selfEmail = '';   // 模式 B 記住廠商 email
let selfVid   = '';   // 模式 B 查到的廠商代號

async function api(action, p = {}) {
  const qs = new URLSearchParams({ action, ...p }).toString();
  try {
    const r = await fetch(`${CONFIG.GAS_URL}?${qs}`);
    return await r.json();
  } catch (e) { return { ok: false, msg: '連線失敗:' + e.message }; }
}

// ── 入口:有 token 走模式 A,沒 token 走模式 B ──
async function init() {
  if (token && vid) {
    // 模式 A:沿用原本 token 驗證
    const v = await api('vp_verifyToken', { token, vid });
    if (!v.ok) {
      document.getElementById('content').innerHTML =
        `<div class="msg err">❌ ${v.msg}<br><br>請改用下方方式,輸入您註冊的 Email 設定密碼。</div>
         <div style="margin-top:14px;"></div>`;
      renderSelfQuery();  // token 失效就退回自助查詢
      return;
    }
    showTokenForm();
  } else {
    // 模式 B:自助查詢
    renderSelfQuery();
  }
}

// ════════ 模式 A:token 設密碼(原邏輯保留)════════
function showTokenForm() {
  document.getElementById('content').innerHTML = `
    <div class="vid-badge">廠商代號:${esc(vid)}</div>
    <div class="tip">⚠️ 請設定一組登入密碼<br>・至少 6 碼<br>・以後登入廠商後台使用</div>
    <input type="password" id="pwd1" placeholder="輸入密碼" autocomplete="new-password" />
    <input type="password" id="pwd2" placeholder="再次輸入密碼" autocomplete="new-password" />
    <button class="btn" id="submitBtn" onclick="submitToken()">設定密碼</button>
    <div id="msg"></div>`;
}
async function submitToken() {
  const pwd1 = document.getElementById('pwd1').value;
  const pwd2 = document.getElementById('pwd2').value;
  const msgEl = document.getElementById('msg'); msgEl.innerHTML = '';
  if (pwd1.length < 6) { msgEl.innerHTML = '<div class="msg err">密碼至少 6 碼</div>'; return; }
  if (pwd1 !== pwd2)   { msgEl.innerHTML = '<div class="msg err">兩次密碼不一致</div>'; return; }
  const btn = document.getElementById('submitBtn'); btn.disabled = true; btn.textContent = '設定中...';
  const res = await api('vp_setPassword', { token, vid, pwd: pwd1 });
  if (res.ok) { showSuccess(); }
  else { btn.disabled = false; btn.textContent = '設定密碼'; msgEl.innerHTML = `<div class="msg err">❌ ${esc(res.msg)}</div>`; }
}

// ════════ 模式 B:自助查詢 ════════
function renderSelfQuery() {
  document.getElementById('content').innerHTML = `
    <div class="tip">請輸入您<b>註冊時填寫的 Email</b>,系統會自動為您查詢審核狀態。</div>
    <input type="email" id="selfEmail" placeholder="您的註冊 Email" autocomplete="email" />
    <button class="btn" id="checkBtn" onclick="doSelfCheck()">查詢 / 設定密碼</button>
    <div id="msg"></div>`;
}

async function doSelfCheck() {
  const email = document.getElementById('selfEmail').value.trim();
  const msgEl = document.getElementById('msg'); msgEl.innerHTML = '';
  if (!email || !/^[^@]+@[^@]+\.[^@]+$/.test(email)) { msgEl.innerHTML = '<div class="msg err">請輸入正確的 Email</div>'; return; }
  const btn = document.getElementById('checkBtn'); btn.disabled = true; btn.textContent = '查詢中...';
  const res = await api('vp_selfCheck', { email });
  btn.disabled = false; btn.textContent = '查詢 / 設定密碼';

  if (!res.ok) { msgEl.innerHTML = `<div class="msg err">❌ ${esc(res.msg)}</div>`; return; }

  selfEmail = email; selfVid = res.vid || '';

  switch (res.stage) {
    case 'approved':  // 已通過 → 設密碼
      showSelfSetForm(res.vid, res.name);
      break;
    case 'pending':   // 審核中 → 擋
      showStatus('⏳', '審核中', '您的申請正在審核中,請耐心等候。<br>審核通過後再回到此頁即可設定密碼。', true);
      break;
    case 'rejected':  // 拒絕
      showStatus('❌', '申請未通過', '很抱歉,您的申請未通過審查。' + (res.reason ? '<br>原因:' + esc(res.reason) : '') + '<br>如有疑問請聯繫 UNI。', false);
      break;
    case 'suspended': // 中止
      showStatus('⏸', '帳號已停用', '您的廠商帳號目前已停用,如需恢復請聯繫 UNI。', false);
      break;
    default:          // 查無
      showStatus('🔍', '查無資料', '找不到此 Email 的申請紀錄。<br>請確認是否與註冊時填寫的 Email 相同。', true);
  }
}

function showSelfSetForm(v, name) {
  document.getElementById('content').innerHTML = `
    <div class="vid-badge">✅ 已通過審核　廠商代號:${esc(v)}</div>
    <div class="tip">請設定一組登入密碼<br>・至少 6 碼<br>・以後登入廠商後台使用</div>
    <input type="password" id="pwd1" placeholder="輸入密碼" autocomplete="new-password" />
    <input type="password" id="pwd2" placeholder="再次輸入密碼" autocomplete="new-password" />
    <button class="btn" id="submitBtn" onclick="submitSelf()">設定密碼</button>
    <div id="msg"></div>`;
}

async function submitSelf() {
  const pwd1 = document.getElementById('pwd1').value;
  const pwd2 = document.getElementById('pwd2').value;
  const msgEl = document.getElementById('msg'); msgEl.innerHTML = '';
  if (pwd1.length < 6) { msgEl.innerHTML = '<div class="msg err">密碼至少 6 碼</div>'; return; }
  if (pwd1 !== pwd2)   { msgEl.innerHTML = '<div class="msg err">兩次密碼不一致</div>'; return; }
  const btn = document.getElementById('submitBtn'); btn.disabled = true; btn.textContent = '設定中...';
  const res = await api('vp_selfSetPassword', { email: selfEmail, vid: selfVid, pwd: pwd1 });
  if (res.ok) { showSuccess(); }
  else { btn.disabled = false; btn.textContent = '設定密碼'; msgEl.innerHTML = `<div class="msg err">❌ ${esc(res.msg)}</div>`; }
}

// ════════ 共用畫面 ════════
function showStatus(icon, title, desc, allowRetry) {
  document.getElementById('content').innerHTML = `
    <div class="status-box">
      <div class="icon">${icon}</div>
      <h2>${title}</h2>
      <p>${desc}</p>
      ${allowRetry ? '<button class="retry-link" onclick="renderSelfQuery()">← 重新查詢</button>' : ''}
    </div>`;
}
function showSuccess() {
  document.getElementById('content').innerHTML = `
    <div class="status-box">
      <div class="icon">✅</div>
      <h2>密碼設定成功!</h2>
      <p>3 秒後自動跳轉登入頁...<br>之後請用「廠商代號 + 密碼」登入後台。</p>
    </div>`;
  setTimeout(() => location.href = CONFIG.PORTAL_URL, 3000);
}
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'})[c]);
}

init();
</script>
</body>
</html>
