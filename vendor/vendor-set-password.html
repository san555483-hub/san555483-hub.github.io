<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UNI 廠商系統 - 設定密碼</title>
<style>
:root { --c-bg:#f5f5f7; --c-card:#fff; --c-primary:#d4a574; --c-text:#2c2c2e; --c-soft:#6e6e73; --c-border:#e5e5ea; --c-success:#34c759; --c-danger:#ff3b30; --r:12px; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif; background:var(--c-bg); color:var(--c-text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
.card { background:var(--c-card); border-radius:var(--r); padding:32px 28px; box-shadow:0 4px 20px rgba(0,0,0,0.06); width:100%; max-width:420px; }
.card h1 { font-size:20px; text-align:center; margin-bottom:6px; }
.card .sub { text-align:center; color:var(--c-soft); font-size:13px; margin-bottom:24px; }
.vid-badge { background:#fff4e6; color:#ff9500; padding:8px 16px; border-radius:8px; font-weight:600; text-align:center; margin-bottom:20px; font-size:14px; }
input { width:100%; padding:12px; border:1px solid var(--c-border); border-radius:8px; margin-bottom:10px; font-size:15px; font-family:inherit; }
.btn { width:100%; background:var(--c-primary); color:#fff; padding:12px; border-radius:8px; font-weight:600; font-size:15px; border:none; cursor:pointer; }
.btn:disabled { background:#ccc; cursor:not-allowed; }
.tip { font-size:12px; color:var(--c-soft); margin-bottom:14px; line-height:1.6; }
.msg { padding:10px; border-radius:8px; margin-top:12px; font-size:13px; }
.msg.err { background:#ffe6e6; color:var(--c-danger); }
.msg.ok { background:#e6f9ed; color:var(--c-success); }
.loading { text-align:center; padding:40px; color:var(--c-soft); }
</style>
</head>
<body>
<div class="card">
  <h1>🔑 設定登入密碼</h1>
  <div class="sub">UNI 廠商系統</div>
  <div id="content"><div class="loading">驗證連結中...</div></div>
</div>

<script>
const CONFIG = {
  GAS_URL: 'https://script.google.com/macros/s/AKfycbxkUfzwSStUmGm52mvbd7ww-ZS4gG8fXGKSWNoYZe8AY-eB17mLfyuhxTQp4CRYZkLyxQ/exec',
  PORTAL_URL: 'https://san555483-hub.github.io/vendor/vendor-portal.html',
};

const params = new URLSearchParams(location.search);
const token = params.get('token');
const vid = params.get('vid');

async function api(action, params = {}) {
  const qs = new URLSearchParams({ action, ...params }).toString();
  try {
    const r = await fetch(`${CONFIG.GAS_URL}?${qs}`);
    return await r.json();
  } catch (e) { return { ok: false, msg: '連線失敗:' + e.message }; }
}

async function init() {
  if (!token || !vid) {
    document.getElementById('content').innerHTML = '<div class="msg err">❌ 連結無效,缺少參數</div>';
    return;
  }
  const v = await api('vp_verifyToken', { token, vid });
  if (!v.ok) {
    document.getElementById('content').innerHTML = `<div class="msg err">❌ ${v.msg}<br><br>請聯繫 Elsa 重新發送連結</div>`;
    return;
  }
  showForm();
}

function showForm() {
  document.getElementById('content').innerHTML = `
    <div class="vid-badge">廠商代號:${vid}</div>
    <div class="tip">⚠️ 請設定一組你的登入密碼<br>・至少 6 碼<br>・以後登入 vendor-portal 使用</div>
    <input type="password" id="pwd1" placeholder="輸入密碼" autocomplete="new-password" />
    <input type="password" id="pwd2" placeholder="再次輸入密碼" autocomplete="new-password" />
    <button class="btn" id="submitBtn" onclick="submit()">設定密碼</button>
    <div id="msg"></div>`;
}

async function submit() {
  const pwd1 = document.getElementById('pwd1').value;
  const pwd2 = document.getElementById('pwd2').value;
  const msgEl = document.getElementById('msg');
  msgEl.innerHTML = '';
  if (pwd1.length < 6) { msgEl.innerHTML = '<div class="msg err">密碼至少 6 碼</div>'; return; }
  if (pwd1 !== pwd2) { msgEl.innerHTML = '<div class="msg err">兩次密碼不一致</div>'; return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '設定中...';
  const res = await api('vp_setPassword', { token, vid, pwd: pwd1 });
  if (res.ok) {
    document.getElementById('content').innerHTML = `
      <div class="msg ok" style="padding:20px;text-align:center;">
        ✅ 密碼設定成功!<br><br>
        3 秒後自動跳轉登入頁...
      </div>`;
    setTimeout(() => location.href = CONFIG.PORTAL_URL, 3000);
  } else {
    btn.disabled = false; btn.textContent = '設定密碼';
    msgEl.innerHTML = `<div class="msg err">❌ ${res.msg}</div>`;
  }
}

init();
</script>
</body>
</html>
