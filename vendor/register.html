<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>廠商註冊申請 - UNI 職人髮品坊</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: linear-gradient(135deg, #f5e6d3 0%, #e8d5c4 100%);
    min-height: 100vh;
    padding: 20px;
    color: #3a2f25;
  }
  .container {
    max-width: 640px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(58, 47, 37, 0.12);
    overflow: hidden;
  }
  .header {
    background: linear-gradient(135deg, #3a2f25 0%, #5c4a3a 100%);
    color: #f5e6d3;
    padding: 32px 24px;
    text-align: center;
  }
  .header h1 { font-size: 22px; letter-spacing: 2px; margin-bottom: 8px; }
  .header p { font-size: 13px; opacity: 0.85; letter-spacing: 1px; }
  .form { padding: 28px 24px; }
  .section {
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px dashed #e0d4c4;
  }
  .section:last-child { border-bottom: none; }
  .section-title {
    font-size: 15px;
    font-weight: bold;
    color: #5c4a3a;
    margin-bottom: 14px;
    padding-left: 8px;
    border-left: 4px solid #c9a87c;
  }
  .field { margin-bottom: 14px; }
  .label {
    display: block;
    font-size: 13px;
    margin-bottom: 6px;
    color: #5c4a3a;
  }
  .label .required { color: #c9352e; margin-left: 4px; }
  input, textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d4c4b0;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: #faf6f0;
    transition: border 0.2s, background 0.2s;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: #c9a87c;
    background: #fff;
  }
  textarea { min-height: 80px; resize: vertical; }
  .hint { font-size: 11px; color: #998877; margin-top: 4px; }
  .submit-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #3a2f25, #5c4a3a);
    color: #f5e6d3;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 2px;
    cursor: pointer;
    margin-top: 8px;
  }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .notice {
    background: #fff8ed;
    border: 1px solid #f0d896;
    border-radius: 8px;
    padding: 12px;
    font-size: 12px;
    color: #6b5530;
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .success-screen {
    text-align: center;
    padding: 60px 24px;
    display: none;
  }
  .success-icon { font-size: 56px; margin-bottom: 16px; }
  .success-title { font-size: 18px; color: #3a2f25; margin-bottom: 12px; font-weight: bold; }
  .success-msg { font-size: 13px; color: #6b5530; line-height: 1.8; }
  .success-apply { 
    background: #f5e6d3; 
    border-radius: 8px; 
    padding: 12px; 
    margin: 20px 0; 
    font-size: 13px; 
    color: #3a2f25; 
    font-family: monospace;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>UNI 職人髮品坊</h1>
    <p>廠商合作申請</p>
  </div>

  <div id="formScreen" class="form">
    <div class="notice">
      <strong>📋 申請須知</strong><br>
      • 請完整填寫以下資訊，UNI 職人髮品坊 將於 3 個工作天內審查<br>
      • 審查結果將透過 Email 通知您<br>
      • 帶 <span style="color:#c9352e">*</span> 為必填欄位
    </div>

    <div class="section">
      <div class="section-title">公司資訊</div>
      <div class="field">
        <label class="label">公司全名 <span class="required">*</span></label>
        <input type="text" id="company_full" placeholder="例：XX生技股份有限公司">
      </div>
      <div class="field">
        <label class="label">品牌簡稱 <span class="required">*</span></label>
        <input type="text" id="display_name" placeholder="例：XX生技">
        <div class="hint">將作為您在系統中的顯示名稱</div>
      </div>
      <div class="field">
        <label class="label">統一編號 <span class="required">*</span></label>
        <input type="text" id="tax_id" maxlength="8" placeholder="8 碼統編">
      </div>
    </div>

    <div class="section">
      <div class="section-title">聯絡資訊</div>
      <div class="field">
        <label class="label">聯絡人姓名 <span class="required">*</span></label>
        <input type="text" id="contact">
      </div>
      <div class="field">
        <label class="label">聯絡 Email <span class="required">*</span></label>
        <input type="email" id="email" placeholder="用於接收審查結果與系統通知">
      </div>
      <div class="field">
        <label class="label">公司地址</label>
        <input type="text" id="address">
      </div>
    </div>

    <div class="section">
      <div class="section-title">財務資訊</div>
      <div class="field">
        <label class="label">收款銀行帳號</label>
        <input type="text" id="bank" placeholder="例：台新銀行 (812) 1234567890">
        <div class="hint">月結對帳款項將匯入此帳戶</div>
      </div>
      <div class="field">
        <label class="label">LINE Pay 手機轉帳號碼</label>
        <input type="text" id="linepay" placeholder="例：0912-345-678">
        <div class="hint">UNI 將優先以 LINE Pay 轉帳以節省雙方手續費</div>
      </div>
      <div class="field">
        <label class="label">其他收款方式</label>
        <input type="text" id="pay_other" placeholder="例：Apple Pay、街口支付、現金、其他">
      </div>
      <div class="field">
        <label class="label">財務備註</label>
        <textarea id="pay_note" placeholder="收款偏好、結算特殊需求、發票開立方式..."></textarea>
      </div>
    </div>

    <div class="section">
      <div class="section-title">品牌與商品</div>
      <div class="field">
        <label class="label">品牌介紹</label>
        <textarea id="brand_intro" placeholder="簡述貴公司品牌特色、主打商品類型..."></textarea>
      </div>
      <div class="field">
        <label class="label">初步上架商品清單</label>
        <textarea id="init_products" placeholder="例：&#10;1. 護髮油 200ml NT$800&#10;2. 修護精華液 100ml NT$1200&#10;（每行一個商品，含名稱、規格、售價）"></textarea>
        <div class="hint">送審後仍需逐一審查方可正式上架</div>
      </div>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitForm()">送出申請</button>
  </div>

  <div id="successScreen" class="success-screen">
    <div class="success-icon">✅</div>
    <div class="success-title">您的申請已成功送出</div>
    <div class="success-msg">
      感謝您申請與 UNI 髮品坊 合作。<br>
      您的申請已推送至「UNI 職人髮品坊」審查中心。<br>
      我們將於 <strong>3 個工作天內</strong>完成審查。
    </div>
    <div class="success-apply" id="applyInfo"></div>
    <div class="success-msg" style="font-size:12px; color:#998877;">
      審查結果將透過您填寫的 Email 通知您
    </div>
  </div>
</div>

<script>
const VENDOR_API = 'https://script.google.com/macros/s/AKfycbxkUfzwSStUmGm52mvbd7ww-ZS4gG8fXGKSWNoYZe8AY-eB17mLfyuhxTQp4CRYZkLyxQ/exec';

function submitForm() {
  const required = ['company_full', 'display_name', 'tax_id', 'contact', 'email'];
  const data = {};
  
  for (const key of required) {
    const val = document.getElementById(key).value.trim();
    if (!val) {
      alert('請填寫：' + document.querySelector('label[class="label"]').textContent);
      document.getElementById(key).focus();
      return;
    }
    data[key] = val;
  }
  
  data.line_uid = ''; // 核准後透過 LINE OA 加好友自動綁
  data.address = document.getElementById('address').value.trim();
  data.bank = document.getElementById('bank').value.trim();
  data.linepay = document.getElementById('linepay').value.trim();
  data.pay_other = document.getElementById('pay_other').value.trim();
  data.pay_note = document.getElementById('pay_note').value.trim();
  data.brand_intro = document.getElementById('brand_intro').value.trim();
  data.init_products = document.getElementById('init_products').value.trim();
  
  // Email 格式驗證
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email)) {
    alert('Email 格式不正確');
    return;
  }
  
  // 統編 8 碼
  if (!/^\d{8}$/.test(data.tax_id)) {
    alert('統一編號需為 8 碼數字');
    return;
  }
  
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送出中...';
  
  const params = new URLSearchParams({ action: 'submitRegister' });
  Object.keys(data).forEach(k => params.append(k, data[k]));
  
  fetch(VENDOR_API + '?' + params.toString())
    .then(r => r.json())
    .then(res => {
      if (res.ok) {
        document.getElementById('formScreen').style.display = 'none';
        document.getElementById('successScreen').style.display = 'block';
        document.getElementById('applyInfo').textContent = 
          '申請編號：' + res.apply_id + '\n預計廠商代號：' + res.vendor_id;
      } else {
        alert('送出失敗：' + (res.msg || '未知錯誤'));
        btn.disabled = false;
        btn.textContent = '送出申請';
      }
    })
    .catch(err => {
      alert('連線錯誤：' + err);
      btn.disabled = false;
      btn.textContent = '送出申請';
    });
}
</script>

</body>
</html>
