<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>UNI 職人髮品坊｜廠商專區</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════
   🟡 UNI 廠商專區 — 四合一精靈
   輸 email → 自動判斷階段 → 帶廠商走對的路
   涵蓋:註冊 / 查進度 / 設密碼 / 登入 / 綁定通知
════════════════════════════════════════════ */
:root{
  --bark:#3d2b1f;--bark2:#5c3d2e;--linen:#faf6f1;--sand:#ede5d8;
  --rose:#c9897a;--rose-lt:#f5e8e4;--gold:#b8895a;--gold-lt:#e8d0b0;
  --moss:#7a8c6e;--ink:#2a1f1a;--mid:#7a6a60;--border:#ddd0c4;
  --shadow:rgba(61,43,31,.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:'Noto Serif TC',serif;
  background:var(--linen);
  background-image:
    radial-gradient(ellipse 70% 50% at 15% 0%,rgba(184,137,90,.10) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 90% 100%,rgba(201,137,122,.08) 0%,transparent 55%);
  color:var(--ink);min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:24px 16px;
}
.wrap{width:100%;max-width:440px;}

/* 品牌頭 */
.brand{text-align:center;margin-bottom:22px;}
.brand .eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  color:var(--gold);font-family:'Noto Sans TC',sans-serif;
  font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;margin-bottom:12px;
}
.brand .eyebrow::before,.brand .eyebrow::after{content:'';width:22px;height:1px;background:var(--gold);opacity:.5;}
.brand h1{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:500;color:var(--bark);letter-spacing:.02em;}
.brand h1 em{font-style:italic;color:var(--gold);}
.brand .sub{font-family:'Noto Sans TC',sans-serif;font-size:.76rem;color:var(--mid);margin-top:8px;}

/* 卡片 */
.card{
  background:#fff;border:1px solid var(--border);border-radius:14px;
  box-shadow:0 16px 48px -16px var(--shadow);overflow:hidden;
  animation:rise .5s ease;
}
@keyframes rise{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.card-body{padding:26px 24px 28px;}

/* 進度條 */
.steps{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:22px;}
.step-dot{
  width:30px;height:30px;border-radius:50%;background:var(--sand);
  display:flex;align-items:center;justify-content:center;
  font-family:'Noto Sans TC',sans-serif;font-size:.72rem;font-weight:700;color:var(--mid);
  border:2px solid var(--sand);transition:all .3s;flex-shrink:0;
}
.step-dot.active{background:var(--gold);border-color:var(--gold);color:#fff;}
.step-dot.done{background:var(--moss);border-color:var(--moss);color:#fff;}
.step-line{width:30px;height:2px;background:var(--sand);transition:background .3s;}
.step-line.done{background:var(--moss);}

/* 文字/輸入 */
.lead{font-family:'Noto Sans TC',sans-serif;font-size:.84rem;color:var(--bark2);line-height:1.8;margin-bottom:16px;text-align:center;}
.lead strong{color:var(--bark);}
input{
  width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:9px;
  font-family:'Noto Serif TC',serif;font-size:.92rem;color:var(--ink);
  background:var(--linen);outline:none;transition:border-color .2s,background .2s;margin-bottom:11px;
}
input:focus{border-color:var(--rose);background:#fff;}

.btn{
  width:100%;padding:14px;border:none;border-radius:9px;
  background:linear-gradient(135deg,var(--gold),var(--bark2));color:#fff;
  font-family:'Noto Serif TC',serif;font-size:.92rem;letter-spacing:.08em;font-weight:600;
  cursor:pointer;transition:all .25s;box-shadow:0 6px 18px -6px rgba(184,137,90,.5);
}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 26px -6px rgba(184,137,90,.6);}
.btn:disabled{background:#ccc;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-ghost{
  width:100%;padding:13px;border:1.5px solid var(--border);border-radius:9px;
  background:#fff;color:var(--bark2);font-family:'Noto Serif TC',serif;font-size:.88rem;
  cursor:pointer;transition:all .2s;margin-top:10px;
}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.btn-line{
  width:100%;padding:13px;border:none;border-radius:9px;background:#06c755;color:#fff;
  font-family:'Noto Sans TC',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;
}
.btn-line:hover{background:#05b34b;}

.msg{padding:11px 13px;border-radius:9px;margin-top:12px;font-family:'Noto Sans TC',sans-serif;font-size:.78rem;line-height:1.7;}
.msg.err{background:#ffe6e6;color:#c0392b;}
.msg.ok{background:rgba(122,140,110,.12);color:var(--moss);}

/* 狀態畫面 */
.stage-box{text-align:center;padding:14px 4px;}
.stage-box .ico{font-size:3rem;margin-bottom:12px;}
.stage-box h2{font-family:'Playfair Display',serif;font-size:1.35rem;color:var(--bark);margin-bottom:10px;}
.stage-box .vid-chip{
  display:inline-block;font-family:'Noto Sans TC',sans-serif;font-size:.8rem;font-weight:600;
  background:var(--rose-lt);color:var(--bark);padding:5px 16px;border-radius:20px;margin-bottom:14px;letter-spacing:.04em;
}
.stage-box p{font-family:'Noto Sans TC',sans-serif;font-size:.82rem;color:var(--mid);line-height:1.9;margin-bottom:16px;}
.back{display:inline-block;margin-top:8px;background:none;border:none;color:var(--gold);font-family:'Noto Sans TC',sans-serif;font-size:.78rem;text-decoration:underline;cursor:pointer;}

.tip{font-family:'Noto Sans TC',sans-serif;font-size:.7rem;color:var(--mid);line-height:1.6;margin-bottom:14px;}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--mid);font-family:'Noto Sans TC',sans-serif;font-size:.7rem;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

.spinner{width:38px;height:38px;border:3px solid var(--sand);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:30px auto;}
@keyframes spin{to{transform:rotate(360deg);}}

/* 綁定通知步驟 */
.bind-code{
  display:block;font-family:'Noto Sans TC',sans-serif;font-size:1.6rem;font-weight:700;
  letter-spacing:.12em;color:var(--bark);background:var(--gold-lt);
  padding:12px;border-radius:10px;text-align:center;margin:6px 0 4px;
}
.qr-box{text-align:center;margin:14px 0 6px;}
.qr-box img{width:160px;height:160px;border:6px solid #fff;border-radius:12px;box-shadow:0 6px 18px -8px var(--shadow);}
.qr-box .qr-cap{font-family:'Noto Sans TC',sans-serif;font-size:.68rem;color:var(--mid);margin-top:6px;}
.bind-steps{text-align:left;font-family:'Noto Sans TC',sans-serif;font-size:.78rem;color:var(--bark2);line-height:1.85;background:var(--linen);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin:12px 0;}
.bind-steps b{color:var(--bark);}
.btn-copy{display:inline-block;margin-top:4px;padding:8px 18px;border:1.5px solid var(--gold);border-radius:8px;background:#fff;color:var(--gold);font-family:'Noto Sans TC',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-copy:hover{background:var(--gold);color:#fff;}

.foot{text-align:center;font-family:'Noto Sans TC',sans-serif;font-size:.66rem;color:var(--mid);margin-top:20px;letter-spacing:.04em;}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="eyebrow">Vendor Portal</div>
    <h1>UNI 職人髮品坊 <em>廠商專區</em></h1>
    <div class="sub">輸入 Email,系統會自動帶您到下一步</div>
  </div>

  <div class="card">
    <div class="card-body" id="body">
      <!-- 進度條 -->
      <div class="steps" id="steps">
        <div class="step-dot active" id="d1">1</div><div class="step-line" id="l1"></div>
        <div class="step-dot" id="d2">2</div><div class="step-line" id="l2"></div>
        <div class="step-dot" id="d3">3</div><div class="step-line" id="l3"></div>
        <div class="step-dot" id="d4">4</div>
      </div>
      <div id="content"></div>
    </div>
  </div>

  <div class="foot">UNI 職人髮品坊 · 廠商合作專區　|　遇到問題請聯繫 UNI</div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
const CONFIG = {
  GAS_URL:      'https://script.google.com/macros/s/AKfycbwFrgxIZo9gWeHkakxYDBaOxHxeVruN2UhEExTTDe5b0Q8WFWWQx6gGzXVdajMc2Zd9iA/exec',
  REGISTER_URL: 'https://san555483-hub.github.io/vendor/register.html',
  PORTAL_URL:   'https://san555483-hub.github.io/vendor/vendor-portal.html',
  OA_ADD_FRIEND:'https://line.me/R/ti/p/@267vmceg',   // 🦅 @267vmceg 廠商通知 OA 加好友連結(有 lin.ee 短連結可換更穩)
};

let curEmail = '';
let curVid   = '';

async function api(action, p = {}) {
  const qs = new URLSearchParams({ action, ...p }).toString();
  try { const r = await fetch(`${CONFIG.GAS_URL}?${qs}`); return await r.json(); }
  catch (e) { return { ok: false, msg: '連線失敗:' + e.message }; }
}
function esc(s){ if(s==null) return ''; return String(s).replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'})[c]); }

// 進度條:step = 1~4
function setSteps(step){
  for(let i=1;i<=4;i++){
    const d=document.getElementById('d'+i);
    d.classList.remove('active','done');
    if(i<step) d.classList.add('done');
    else if(i===step) d.classList.add('active');
  }
  for(let i=1;i<=3;i++){
    const l=document.getElementById('l'+i);
    l.classList.toggle('done', i<step);
  }
}
function showSteps(show){ document.getElementById('steps').style.display = show?'flex':'none'; }

// ════════ 畫面 1:輸 email 入口 ════════
function screenStart(){
  showSteps(true); setSteps(1);
  document.getElementById('content').innerHTML = `
    <div class="lead">您好!請輸入您的 <strong>Email</strong>,<br>系統會自動為您查詢狀態並帶您前往下一步。</div>
    <input type="email" id="email" placeholder="您的 Email" autocomplete="email" />
    <button class="btn" id="goBtn" onclick="checkStage()">開始 →</button>
    <div class="divider">還沒申請過?</div>
    <button class="btn-ghost" onclick="location.href='${CONFIG.REGISTER_URL}'">📋 我是新廠商,前往申請</button>
    <div id="msg"></div>`;
  const inp = document.getElementById('email');
  if(curEmail) inp.value = curEmail;
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter') checkStage(); });
}

// 查階段
async function checkStage(){
  const email = document.getElementById('email').value.trim();
  const msg = document.getElementById('msg'); msg.innerHTML='';
  if(!email || !/^[^@]+@[^@]+\.[^@]+$/.test(email)){ msg.innerHTML='<div class="msg err">請輸入正確的 Email</div>'; return; }
  curEmail = email;
  const btn = document.getElementById('goBtn'); btn.disabled=true; btn.textContent='查詢中...';
  const res = await api('vp_selfCheck', { email });
  btn.disabled=false; btn.textContent='開始 →';
  if(!res.ok){ msg.innerHTML=`<div class="msg err">❌ ${esc(res.msg)}</div>`; return; }
  curVid = res.vid || '';
  routeStage(res);
}

function routeStage(res){
  switch(res.stage){
    case 'approved':  screenSetPwd(res); break;
    case 'pending':   screenPending();   break;
    case 'rejected':  screenRejected(res.reason); break;
    case 'suspended': screenSuspended();  break;
    default:          screenNotFound();
  }
}

// ════════ 畫面 2:審核中 ════════
function screenPending(){
  showSteps(true); setSteps(2);
  document.getElementById('content').innerHTML = `
    <div class="stage-box">
      <div class="ico">⏳</div>
      <h2>審核中</h2>
      ${curVid?`<div class="vid-chip">廠商代號:${esc(curVid)}</div>`:''}
      <p>您的申請已送達,UNI 正在審核中。<br>審核通常 3 個工作天內完成,<br>通過後會以 <strong>Email</strong> 通知您,<br>再回到本頁即可設定密碼。</p>
      <button class="back" onclick="screenStart()">← 用其他 Email 查詢</button>
    </div>`;
}

// ════════ 畫面 3:已通過 → 設密碼 ════════
function screenSetPwd(res){
  showSteps(true); setSteps(3);
  document.getElementById('content').innerHTML = `
    <div class="stage-box" style="padding-bottom:4px;">
      <div class="ico">🎉</div>
      <h2>恭喜!已通過審核</h2>
      <div class="vid-chip">廠商代號:${esc(res.vid||curVid)}</div>
    </div>
    <div class="tip">請設定一組登入密碼(至少 6 碼),<br>之後用「廠商代號 + 密碼」登入後台。</div>
    <input type="password" id="pwd1" placeholder="設定密碼(至少 6 碼)" autocomplete="new-password" />
    <input type="password" id="pwd2" placeholder="再次輸入密碼" autocomplete="new-password" />
    <button class="btn" id="setBtn" onclick="doSetPwd()">設定密碼並完成 →</button>
    <button class="back" onclick="screenStart()">← 返回</button>
    <div id="msg"></div>`;
}
async function doSetPwd(){
  const p1=document.getElementById('pwd1').value, p2=document.getElementById('pwd2').value;
  const msg=document.getElementById('msg'); msg.innerHTML='';
  if(p1.length<6){ msg.innerHTML='<div class="msg err">密碼至少 6 碼</div>'; return; }
  if(p1!==p2){ msg.innerHTML='<div class="msg err">兩次密碼不一致</div>'; return; }
  const btn=document.getElementById('setBtn'); btn.disabled=true; btn.textContent='設定中...';
  const res=await api('vp_selfSetPassword',{ email:curEmail, vid:curVid, pwd:p1 });
  if(res.ok){ curVid=res.vid||curVid; screenBind(); }   // 🦅 設密碼成功 → 先進綁定通知
  else{ btn.disabled=false; btn.textContent='設定密碼並完成 →'; msg.innerHTML=`<div class="msg err">❌ ${esc(res.msg)}</div>`; }
}

// ════════ 畫面 3.5:綁定通知 OA(自動判斷手機/桌機,加 @267vmceg 好友 + 送代號) ════════
const IS_MOBILE = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
function screenBind(){
  showSteps(true); setSteps(4);
  const qrBox = `
    <div class="qr-box">
      <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAUoAAAFKCAIAAAD0S4FSAAAGPklEQVR4nO3dwW0kNxBAUcvYQByAY3DwjsEBbCbtqw4LwjBVIPvrvetiNL0z88FLofjxPM9vQNHvpx8AmCJvyJI3ZMkbsuQNWfKGLHlDlrwhS96QJW/IkjdkyRuy5A1Z8oYseUOWvCFL3pAlb8iSN2T92HnxX3/+8UWPcYu///m5+Nf1/3f92rWdT3LnfXfMPfPO5/zdfpNrTm/IkjdkyRuy5A1Z8oYseUOWvCFL3pAlb8jamlpbOzVNtfbG+bBTTs2lzbnzG5z7NJzekCVvyJI3ZMkbsuQNWfKGLHlDlrwhS96QNTi1tjY3qXPn7rGdp3rjZrK5T2NO7zfp9IYseUOWvCFL3pAlb8iSN2TJG7LkDVnyhqxjU2tvdGo+7M65tDlvnHi7k9MbsuQNWfKGLHlDlrwhS96QJW/IkjdkyRuyTK293ql7POem5cylfRWnN2TJG7LkDVnyhix5Q5a8IUvekCVvyJI3ZB2bWvtuk0l3bkQ7tdXszm1qvd+k0xuy5A1Z8oYseUOWvCFL3pAlb8iSN2TJG7IGp9beeDflnLm9ZXe+du3U+36336TTG7LkDVnyhix5Q5a8IUvekCVvyJI3ZMkbsram1nq7qXacuk9zzp33h675TX7m9IYseUOWvCFL3pAlb8iSN2TJG7LkDVnyhqyP53n+94vfeL/kqfkwG8I+u/M72jH3/e78Zac3ZMkbsuQNWfKGLHlDlrwhS96QJW/IkjdkXbpr7dTdlG/U+x+t3bkB7s5JO6c3ZMkbsuQNWfKGLHlDlrwhS96QJW/IkjdkbU2tnbrncW4y6dQc3prbNv+7N040zn2DTm/IkjdkyRuy5A1Z8oYseUOWvCFL3pAlb8jauiF0R2/Wam4ezsTbZ3fOHc59zm4IBX5B3pAlb8iSN2TJG7LkDVnyhix5Q5a8IWtw19p62ubOrWannHrmuVm6UzNec+Z+sXN/2ekNWfKGLHlDlrwhS96QJW/IkjdkyRuy5A1Zg7vWTu2XutMbJ7FObTXbcefnvMOuNeAX5A1Z8oYseUOWvCFL3pAlb8iSN2TJG7IGd62tnZqXuvO2zTsnwHacmni7c4vbqadyekOWvCFL3pAlb8iSN2TJG7LkDVnyhix5Q9bW1NrOLM7cpM6dG8JOve/cLa6nJgvnnurOWckdTm/IkjdkyRuy5A1Z8oYseUOWvCFL3pAlb8jauiH01HzYnbdAntrENvdpvPF979xad+qZnd6QJW/IkjdkyRuy5A1Z8oYseUOWvCFL3pA1OLW2dudE1Nqd90vy2Z3f0anbY53ekCVvyJI3ZMkbsuQNWfKGLHlDlrwhS96QNXhD6Nqp6aJT80Nz3jjhd2qb2qn9f6dmNJ3ekCVvyJI3ZMkbsuQNWfKGLHlDlrwhS96QtTW1NufUVNPO/NAb7y3d8cbPam5m8dRc2prTG7LkDVnyhix5Q5a8IUvekCVvyJI3ZMkbsram1u6c0zp1b+mdc0unzM0O3jnxdudMm9MbsuQNWfKGLHlDlrwhS96QJW/IkjdkyRuyjt0Q+sb33XFq59kb7w+de9+1uR1+pzi9IUvekCVvyJI3ZMkbsuQNWfKGLHlDlrwhK7hrbcfcJNbctq1Tz7zzl+fc+T86NfHm9IYseUOWvCFL3pAlb8iSN2TJG7LkDVnyhqytqbW1O3dTvXH26M7pse82H3bnt7Dm9IYseUOWvCFL3pAlb8iSN2TJG7LkDVnyhqzBqbW1O2+uXLtzt9ydM15rO8/8xi1udq0BX0zekCVvyJI3ZMkbsuQNWfKGLHlDlrwh69jU2hvduW3rzqd64yzdKXNb65zekCVvyJI3ZMkbsuQNWfKGLHlDlrwhS96QZWrty8zNHp163/VrT82l3fk538npDVnyhix5Q5a8IUvekCVvyJI3ZMkbsuQNWcem1nr7tO6c8dr5y6c2sc3dtvnGCb8dTm/IkjdkyRuy5A1Z8oYseUOWvCFL3pAlb8ganFp7426qtTtnnuZeO/eX13q/nLW5qUSnN2TJG7LkDVnyhix5Q5a8IUvekCVvyJI3ZH08z3P6GYARTm/IkjdkyRuy5A1Z8oYseUOWvCFL3pAlb8iSN2TJG7LkDVnyhix5Q5a8IUvekCVvyJI3ZMkbsv4FCSwFs3qKRGIAAAAASUVORK5CYII=" alt="加好友 QR" />
      <div class="qr-cap">用手機 LINE 掃這個 QR 加好友</div>
    </div>`;
  const addBtn = `<a class="btn-line" href="${CONFIG.OA_ADD_FRIEND}">＋ 點這裡加 LINE 好友</a>`;
  document.getElementById('content').innerHTML = `
    <div class="stage-box" style="padding-bottom:2px;">
      <div class="ico">🔔</div>
      <h2>最後一步:綁定通知</h2>
      <p style="margin-bottom:6px;">加好友才收得到<strong>訂單與審核通知</strong>。</p>
    </div>

    <div class="bind-steps">
      <div><b>①</b> 先複製你的廠商代號</div>
      <span class="bind-code">${esc(curVid)}</span>
      <div style="text-align:center;"><button class="btn-copy" id="copyBtn" onclick="copyCode()">📋 複製代號</button></div>
      <div style="margin-top:12px;"><b>②</b> ${IS_MOBILE ? '點下方按鈕加好友' : '用手機掃右邊 QR 加好友'},在聊天室<b>貼上代號送出</b></div>
    </div>

    ${IS_MOBILE ? addBtn : qrBox}

    <button class="btn" id="bindBtn" onclick="checkBind()" style="margin-top:14px;"><b>③</b> 我已送出代號 → 檢查並完成</button>
    <button class="back" onclick="screenDone()">先跳過,稍後再綁定 →</button>
    <div id="msg"></div>`;
}
function copyCode(){
  const code = curVid || '';
  const btn = document.getElementById('copyBtn');
  const done = ()=>{ if(btn){ btn.textContent='✓ 已複製'; setTimeout(()=>{ if(btn) btn.textContent='📋 複製代號'; },1500); } };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(code).then(done).catch(()=>fallbackCopy(code,done));
  } else { fallbackCopy(code,done); }
}
function fallbackCopy(text,cb){
  const t=document.createElement('textarea'); t.value=text; t.style.position='fixed'; t.style.opacity='0';
  document.body.appendChild(t); t.focus(); t.select();
  try{ document.execCommand('copy'); cb&&cb(); }catch(e){}
  document.body.removeChild(t);
}
async function checkBind(){
  const btn=document.getElementById('bindBtn'); const msg=document.getElementById('msg'); msg.innerHTML='';
  btn.disabled=true; btn.textContent='檢查中...';
  const res=await api('chkVendorBind',{ vid:curVid });
  btn.disabled=false; btn.innerHTML='<b>③</b> 我已送出代號 → 檢查並完成';
  if(res.ok && res.bound){ screenDone(); }
  else{ msg.innerHTML='<div class="msg err">尚未收到綁定。請確認已加好友,並在 LINE 聊天室貼上代號 '+esc(curVid)+' 送出,再按一次檢查。</div>'; }
}

// ════════ 畫面 4:完成 ════════
function screenDone(){
  showSteps(true); setSteps(4);
  for(let i=1;i<=4;i++) document.getElementById('d'+i).classList.add('done');
  for(let i=1;i<=3;i++) document.getElementById('l'+i).classList.add('done');
  document.getElementById('content').innerHTML = `
    <div class="stage-box">
      <div class="ico">✅</div>
      <h2>全部完成!</h2>
      <div class="vid-chip">廠商代號:${esc(curVid)}</div>
      <p>以後請用「<strong>${esc(curVid)} + 您的密碼</strong>」登入後台,<br>即可查看您的訂單與分潤。</p>
      <button class="btn" onclick="location.href='${CONFIG.PORTAL_URL}'">前往廠商後台登入 →</button>
    </div>`;
}

// ════════ 拒絕 / 中止 / 查無 ════════
function screenRejected(reason){
  showSteps(false);
  document.getElementById('content').innerHTML = `
    <div class="stage-box">
      <div class="ico">📋</div>
      <h2>申請未通過</h2>
      <p>很抱歉,您的申請目前未通過審查。${reason?'<br>原因:'+esc(reason):''}<br>如有疑問,歡迎聯繫 UNI 了解詳情。</p>
      <button class="btn-ghost" onclick="location.href='${CONFIG.REGISTER_URL}'">重新提出申請</button>
      <button class="back" onclick="screenStart()">← 返回</button>
    </div>`;
}
function screenSuspended(){
  showSteps(false);
  document.getElementById('content').innerHTML = `
    <div class="stage-box">
      <div class="ico">⏸</div>
      <h2>帳號已停用</h2>
      ${curVid?`<div class="vid-chip">廠商代號:${esc(curVid)}</div>`:''}
      <p>您的廠商帳號目前已停用。<br>如需恢復合作,請聯繫 UNI。</p>
      <button class="back" onclick="screenStart()">← 返回</button>
    </div>`;
}
function screenNotFound(){
  showSteps(false);
  document.getElementById('content').innerHTML = `
    <div class="stage-box">
      <div class="ico">🔍</div>
      <h2>查無申請紀錄</h2>
      <p>找不到此 Email 的申請。<br>請確認是否與申請時填寫的 Email 相同,<br>或您尚未提出申請。</p>
      <button class="btn" onclick="location.href='${CONFIG.REGISTER_URL}'">📋 前往申請</button>
      <button class="back" onclick="screenStart()">← 用其他 Email 查詢</button>
    </div>`;
}

// 啟動
screenStart();
</script>
</body>
</html>
