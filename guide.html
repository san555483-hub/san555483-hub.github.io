<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNI 使用指南</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f2ea; --card:#ffffff; --ink:#2a1f1a; --brown:#3a2c23;
    --gold:#c4a882; --gold-dark:#a08660; --gold-soft:#e8dcc8;
    --muted:#9a8f82; --line:#ece3d6;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--ink);
    line-height:1.7; -webkit-font-smoothing:antialiased; padding-bottom:48px;
  }

  /* ===== Hero ===== */
  .hero{
    background:linear-gradient(160deg,#2a1f1a 0%,#3a2c23 100%);
    color:#fff; padding:46px 24px 38px; text-align:center; position:relative; overflow:hidden;
  }
  .hero::after{
    content:""; position:absolute; inset:0;
    background:radial-gradient(circle at 50% 0%,rgba(196,168,130,.18),transparent 60%);
  }
  .hero-mark{
    font-family:'Noto Serif TC',serif; font-size:13px; letter-spacing:.42em;
    color:var(--gold); margin-bottom:14px; position:relative;
  }
  .hero-title{
    font-family:'Noto Serif TC',serif; font-size:27px; font-weight:600;
    letter-spacing:.06em; position:relative;
  }
  .hero-sub{
    font-size:13px; color:rgba(255,255,255,.62); margin-top:10px;
    letter-spacing:.04em; position:relative;
  }
  .hero-rule{
    width:42px; height:1px; background:var(--gold); margin:18px auto 0;
    position:relative; opacity:.7;
  }

  /* ===== Container ===== */
  .wrap{max-width:560px; margin:0 auto; padding:28px 18px 0;}

  .intro{
    text-align:center; font-size:13.5px; color:var(--muted);
    margin:4px 4px 26px; line-height:1.9;
  }

  /* ===== Guide cards ===== */
  .guide{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    overflow:hidden; margin-bottom:22px;
    box-shadow:0 2px 14px rgba(58,44,35,.05);
  }
  .guide-head{
    display:flex; align-items:center; gap:12px;
    padding:17px 20px; border-bottom:1px solid var(--line);
    background:linear-gradient(90deg,rgba(196,168,130,.08),transparent);
  }
  .guide-icon{
    width:38px; height:38px; flex:none; border-radius:10px;
    background:var(--ink); color:var(--gold);
    display:flex; align-items:center; justify-content:center; font-size:19px;
  }
  .guide-meta{flex:1;}
  .guide-name{
    font-family:'Noto Serif TC',serif; font-size:16px; font-weight:600;
    color:var(--brown); letter-spacing:.03em;
  }
  .guide-tag{font-size:11.5px; color:var(--muted); margin-top:2px; letter-spacing:.03em;}

  .guide-img-wrap{padding:14px 14px 4px;}
  .guide-img{
    width:100%; display:block; border-radius:10px; border:1px solid var(--line);
  }
  /* placeholder when no real image yet */
  .guide-img.ph{
    aspect-ratio:3/4; background:
      repeating-linear-gradient(45deg,#f3ece0,#f3ece0 12px,#efe6d6 12px,#efe6d6 24px);
    display:flex; align-items:center; justify-content:center;
    color:var(--gold-dark); font-size:13px; letter-spacing:.05em; text-align:center;
  }

  .guide-foot{
    padding:12px 20px 18px; font-size:12.5px; color:var(--muted);
    line-height:1.8; text-align:center;
  }

  /* ===== Footer ===== */
  .foot{
    text-align:center; margin-top:8px; padding:24px;
  }
  .foot-line{width:32px; height:1px; background:var(--gold); margin:0 auto 16px; opacity:.6;}
  .foot-text{font-size:12.5px; color:var(--muted); line-height:1.9;}
  .foot-cta{
    display:inline-block; margin-top:16px; background:var(--ink); color:var(--gold);
    text-decoration:none; padding:11px 26px; border-radius:9px;
    font-size:13.5px; font-weight:500; letter-spacing:.05em;
    border:1px solid var(--gold-dark);
  }
  .foot-brand{
    font-family:'Noto Serif TC',serif; font-size:11px; letter-spacing:.4em;
    color:var(--gold-dark); margin-top:26px;
  }
</style>
</head>
<body>

  <header class="hero">
    <div class="hero-mark">UNI HAIR DESIGN</div>
    <h1 class="hero-title">使用指南</h1>
    <div class="hero-sub">一對一訂製 · 親子美髮</div>
    <div class="hero-rule"></div>
  </header>

  <div class="wrap">
    <p class="intro">
      為您整理常用的操作與保養教學<br>
      點開圖片即可看完整步驟 🙏
    </p>

    <!-- ===== 指南 1：尊爵系統操作 ===== -->
    <section class="guide">
      <div class="guide-head">
        <div class="guide-icon">📱</div>
        <div class="guide-meta">
          <div class="guide-name">尊爵系統操作指南</div>
          <div class="guide-tag">四步驟 · 預約・查明細・選時段</div>
        </div>
      </div>
      <div class="guide-img-wrap">
        <img class="guide-img" src="https://res.cloudinary.com/dvti8ug8s/image/upload/v1781328309/ChatGPT_Image_2026%E5%B9%B46%E6%9C%8813%E6%97%A5_%E4%B8%8B%E5%8D%8801_23_58.png" alt="尊爵系統操作指南 四步驟" loading="lazy">
      </div>
      <div class="guide-foot">
        從 LINE 選單點開尊爵預約頁 → 輸入手機確認身份<br>
        → 查看消費購物明細 → 選時段送出預約
      </div>
    </section>

    <!-- ===== 指南 2：髮品使用 ===== -->
    <section class="guide">
      <div class="guide-head">
        <div class="guide-icon">💧</div>
        <div class="guide-meta">
          <div class="guide-name">髮品居家使用指南</div>
          <div class="guide-tag">女神油 · 八步驟保養教學</div>
        </div>
      </div>
      <div class="guide-img-wrap">
        <img class="guide-img" src="https://res.cloudinary.com/dvti8ug8s/image/upload/q_auto/f_auto/v1781328064/63505.jpg" alt="髮品居家使用指南 女神油八步驟" loading="lazy">
      </div>
      <div class="guide-foot">
        洗後濕髮 → 女神油推勻從髮尾塗抹 → 吹至八分乾<br>
        → 補抗熱油 → 再吹乾，柔順發光 ✨
      </div>
    </section>

    <!-- 新增指南：複製上面任一 section 區塊，改 icon／名稱／圖片網址即可 -->

    <footer class="foot">
      <div class="foot-line"></div>
      <p class="foot-text">
        還是覺得不順？歡迎來店<br>
        Elsa 很樂意與您分享 ^^
      </p>
      <a class="foot-cta" href="https://line.me/R/ti/p/@261bhcyh" target="_blank" rel="noopener">回 LINE 預約</a>
      <div class="foot-brand">UNI HAIR DESIGN</div>
    </footer>
  </div>

</body>
</html>
