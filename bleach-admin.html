<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🟣 染前對照圖後台 ｜ UNI</title>
<style>
  :root{
    --bg:#1a120b; --card:#2a1d12; --line:#4a3526;
    --gold:#c9a55c; --txt:#f3e9da; --sub:#a8927a;
    --ok:#4caf7d; --warn:#d98a3d; --del:#c25b4e;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--txt);font-family:"Noto Sans TC","PingFang TC",sans-serif;
       padding:16px;max-width:640px;margin:0 auto;line-height:1.6;}
  h1{font-size:20px;color:var(--gold);text-align:center;margin-bottom:4px;}
  .sub{text-align:center;color:var(--sub);font-size:13px;margin-bottom:18px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
        padding:16px;margin-bottom:14px;}
  label{display:block;font-size:13px;color:var(--sub);margin:10px 0 4px;}
  input,textarea{width:100%;background:#160f08;border:1px solid var(--line);
    border-radius:9px;color:var(--txt);padding:11px;font-size:15px;font-family:inherit;}
  textarea{resize:vertical;min-height:60px;}
  input:focus,textarea:focus{outline:none;border-color:var(--gold);}
  button{border:none;border-radius:10px;padding:12px 16px;font-size:15px;
    font-weight:700;cursor:pointer;font-family:inherit;width:100%;margin-top:14px;}
  .btn-add{background:var(--gold);color:#1a120b;}
  .btn-add:active{opacity:.8;}
  .row{display:flex;gap:10px;align-items:center;background:#160f08;
    border:1px solid var(--line);border-radius:11px;padding:10px;margin-bottom:10px;}
  .row img{width:64px;height:64px;object-fit:cover;border-radius:8px;flex-shrink:0;background:#000;}
  .row .info{flex:1;min-width:0;}
  .row .info b{display:block;font-size:14px;color:var(--txt);}
  .row .info span{display:block;font-size:12px;color:var(--sub);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row .ord{font-size:11px;color:var(--gold);}
  .btn-del{background:transparent;border:1px solid var(--del);color:var(--del);
    width:auto;padding:7px 11px;font-size:13px;margin:0;flex-shrink:0;}
  .msg{text-align:center;font-size:14px;padding:10px;border-radius:9px;margin-top:10px;display:none;}
  .msg.ok{background:rgba(76,175,125,.15);color:var(--ok);display:block;}
  .msg.err{background:rgba(194,91,78,.15);color:var(--del);display:block;}
  .empty{text-align:center;color:var(--sub);font-size:14px;padding:24px 0;}
  .hint{font-size:12px;color:var(--sub);margin-top:6px;line-height:1.5;}
  .url-box{font-size:12px;}
  .sec-title{font-size:14px;color:var(--gold);font-weight:700;margin-bottom:4px;}
  details{margin-top:10px;}
  summary{cursor:pointer;color:var(--sub);font-size:13px;}
</style>
</head>
<body>
  <h1>🟣 染前對照圖後台</h1>
  <div class="sub">卡4 對照圖管理 · 圖走 Cloudinary · 獨立分頁不打架</div>

  <!-- 設定區（URL + token，摺疊） -->
  <div class="card">
    <details id="cfgBox">
      <summary>⚙️ 連線設定（第一次用先確認）</summary>
      <label>主GS Web App 網址（/exec 結尾）</label>
      <input id="gasUrl" class="url-box" placeholder="https://script.google.com/macros/s/.../exec">
      <label>後台保護碼 token</label>
      <input id="token" value="uni_bleach_2026">
      <div class="hint">網址＝🔴主系統 GS「管理部署→Web App」那條 /exec 網址。<br>填好後會自動記住（存在本機，不外流）。</div>
    </details>
  </div>

  <!-- 新增區 -->
  <div class="card">
    <div class="sec-title">➕ 新增對照圖</div>
    <label>圖網址（Cloudinary）</label>
    <input id="img" placeholder="https://res.cloudinary.com/dvti8ug8s/image/upload/...">
    <label>標題</label>
    <input id="title" placeholder="例：暗 vs 亮（同樣白髮）">
    <label>說明</label>
    <textarea id="desc" placeholder="例：左深色對比突兀／右淡亮霧色自然共存"></textarea>
    <button class="btn-add" onclick="addImg()">＋ 上傳這張</button>
    <div id="addMsg" class="msg"></div>
  </div>

  <!-- 清單區 -->
  <div class="card">
    <div class="sec-title">📋 目前的對照圖</div>
    <div id="list"><div class="empty">載入中…</div></div>
  </div>

<script>
  // ── 設定記憶（localStorage）──
  const DEFAULT_URL = 'https://script.google.com/macros/s/AKfycbz_PASTE_YOUR_EXEC_URL/exec';
  const $ = id => document.getElementById(id);

  function loadCfg(){
    const u = localStorage.getItem('bleach_gas_url');
    $('gasUrl').value = u || DEFAULT_URL;
    if(!u) $('cfgBox').open = true; // 沒設過→自動展開提醒
  }
  function getUrl(){
    const u = $('gasUrl').value.trim();
    if(u) localStorage.setItem('bleach_gas_url', u);
    return u;
  }
  function getToken(){ return $('token').value.trim(); }

  function showMsg(el, text, ok){
    el.textContent = text;
    el.className = 'msg ' + (ok ? 'ok' : 'err');
    if(ok) setTimeout(()=>{ el.className='msg'; }, 2500);
  }

  // ── 讀清單（一般 GET，可讀回應）──
  async function loadList(){
    const url = getUrl();
    if(!url || url.includes('PASTE_YOUR')){
      $('list').innerHTML = '<div class="empty">⚠️ 請先在上方「連線設定」填主GS網址</div>';
      $('cfgBox').open = true;
      return;
    }
    try{
      const res = await fetch(url + '?action=getBleachImgs&t=' + Date.now());
      const data = await res.json();
      const imgs = (data && data.imgs) || [];
      if(!imgs.length){
        $('list').innerHTML = '<div class="empty">目前沒有對照圖<br>（上方新增第一張）</div>';
        return;
      }
      $('list').innerHTML = imgs.map(g => `
        <div class="row">
          <img src="${g.img}" onerror="this.style.opacity=.3">
          <div class="info">
            <span class="ord">排序 ${g.order}</span>
            <b>${esc(g.title)}</b>
            <span>${esc(g.desc||'')}</span>
          </div>
          <button class="btn-del" onclick="delImg(${g.order})">刪除</button>
        </div>`).join('');
    }catch(err){
      $('list').innerHTML = '<div class="empty">❌ 讀取失敗：'+esc(err.message)+'<br>檢查網址是否正確、是否已部署新版本</div>';
    }
  }

  function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  // ── 新增（no-cors GET 寫入，不讀回應，照鐵則）──
  async function addImg(){
    const url = getUrl();
    const token = getToken();
    const img = $('img').value.trim();
    const title = $('title').value.trim();
    const desc = $('desc').value.trim();
    if(!url || url.includes('PASTE_YOUR')){ showMsg($('addMsg'),'請先填主GS網址',false); $('cfgBox').open=true; return; }
    if(!img){ showMsg($('addMsg'),'請填圖網址',false); return; }
    if(!title){ showMsg($('addMsg'),'請填標題',false); return; }
    const q = url + '?action=saveBleachImg'
      + '&token=' + encodeURIComponent(token)
      + '&img='   + encodeURIComponent(img)
      + '&title=' + encodeURIComponent(title)
      + '&desc='  + encodeURIComponent(desc);
    try{
      await fetch(q, { method:'GET', mode:'no-cors' }); // 無回應，照鐵則
      showMsg($('addMsg'),'✅ 已上傳，下方更新中…',true);
      $('img').value=''; $('title').value=''; $('desc').value='';
      setTimeout(loadList, 1200); // 等寫入完成再撈
    }catch(err){
      showMsg($('addMsg'),'❌ '+err.message,false);
    }
  }

  // ── 刪除（no-cors GET）──
  async function delImg(order){
    if(!confirm('確定刪除排序 '+order+' 這張？')) return;
    const url = getUrl();
    const q = url + '?action=deleteBleachImg&token=' + encodeURIComponent(getToken()) + '&order=' + order;
    try{
      await fetch(q, { method:'GET', mode:'no-cors' });
      setTimeout(loadList, 1200);
    }catch(err){ alert('刪除失敗：'+err.message); }
  }

  loadCfg();
  loadList();
</script>
</body>
</html>
